
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Service - FurrButler ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 0.75rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-save {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
            color: white;
        }
        .status-toggle {
            background-color: #e9ecef;
            border-radius: 8px;
            padding: 1rem;
        }
        .price-preview {
            background-color: #e8f5e8;
            border: 1px solid #28a745;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-0">✏️ Edit Service</h1>
                    <p class="mb-0">Update your service details and pricing</p>
                </div>
                <a href="/erp/services" class="btn btn-outline-light">← Back to Services</a>
            </div>
        </div>
    </div>

    <div class="container">
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'message' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="form-container">
            <form method="POST" id="serviceForm">
                <div class="mb-4">
                    <label for="service_name" class="form-label">Service Name *</label>
                    <input type="text" class="form-control" id="service_name" name="service_name" required 
                           value="{{ service[1] }}" placeholder="e.g., Full Grooming Package, Nail Trimming">
                </div>

                <div class="mb-4">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category">
                        <option value="Grooming" {% if service[5] == 'Grooming' %}selected{% endif %}>Grooming</option>
                        <option value="Health Care" {% if service[5] == 'Health Care' %}selected{% endif %}>Health Care</option>
                        <option value="Boarding" {% if service[5] == 'Boarding' %}selected{% endif %}>Boarding</option>
                        <option value="Training" {% if service[5] == 'Training' %}selected{% endif %}>Training</option>
                        <option value="Consultation" {% if service[5] == 'Consultation' %}selected{% endif %}>Consultation</option>
                        <option value="Emergency" {% if service[5] == 'Emergency' %}selected{% endif %}>Emergency</option>
                        <option value="General" {% if service[5] == 'General' %}selected{% endif %}>General</option>
                    </select>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="price" class="form-label">Price ({{ vendor_currency }}) *</label>
                        <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" required 
                               value="{{ service[3] }}" oninput="updatePreview()">
                    </div>
                    <div class="col-md-6">
                        <label for="duration_minutes" class="form-label">Duration (minutes)</label>
                        <select class="form-select" id="duration_minutes" name="duration_minutes">
                            <option value="15" {% if service[4] == 15 %}selected{% endif %}>15 minutes</option>
                            <option value="30" {% if service[4] == 30 %}selected{% endif %}>30 minutes</option>
                            <option value="45" {% if service[4] == 45 %}selected{% endif %}>45 minutes</option>
                            <option value="60" {% if service[4] == 60 %}selected{% endif %}>1 hour</option>
                            <option value="90" {% if service[4] == 90 %}selected{% endif %}>1.5 hours</option>
                            <option value="120" {% if service[4] == 120 %}selected{% endif %}>2 hours</option>
                            <option value="180" {% if service[4] == 180 %}selected{% endif %}>3 hours</option>
                            <option value="240" {% if service[4] == 240 %}selected{% endif %}>4 hours</option>
                            <option value="480" {% if service[4] == 480 %}selected{% endif %}>8 hours (Full day)</option>
                            <option value="1440" {% if service[4] == 1440 %}selected{% endif %}>24 hours (Overnight)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Service Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4" 
                              placeholder="Describe what's included in this service...">{{ service[2] or '' }}</textarea>
                </div>

                <div class="status-toggle mb-4">
                    <label class="form-label d-block">Service Status</label>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="is_active" name="is_active" 
                               {% if service[6] %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">
                            <span id="statusLabel">{% if service[6] %}Active - Visible to customers{% else %}Inactive - Hidden from customers{% endif %}</span>
                        </label>
                    </div>
                </div>

                <div class="price-preview mb-4">
                    <h5 class="text-success mb-1">Service Preview</h5>
                    <div class="h4 text-success mb-0">{{ vendor_currency }}<span id="previewPrice">{{ "%.2f"|format(service[3]) }}</span></div>
                    <small class="text-muted">for <span id="previewDuration">{{ service[4] }}</span> minutes</small>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-save btn-lg">
                        💾 Update Service
                    </button>
                    <a href="/erp/services" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updatePreview() {
            const price = document.getElementById('price').value;
            const duration = document.getElementById('duration_minutes').value;
            
            if (price && price > 0) {
                document.getElementById('previewPrice').textContent = parseFloat(price).toFixed(2);
                document.getElementById('previewDuration').textContent = duration;
            }
        }

        // Update duration in preview when changed
        document.getElementById('duration_minutes').addEventListener('change', updatePreview);

        // Status toggle update
        document.getElementById('is_active').addEventListener('change', function() {
            const label = document.getElementById('statusLabel');
            if (this.checked) {
                label.textContent = 'Active - Visible to customers';
            } else {
                label.textContent = 'Inactive - Hidden from customers';
            }
        });

        // Form validation
        document.getElementById('serviceForm').addEventListener('submit', function(e) {
            const price = document.getElementById('price').value;
            const serviceName = document.getElementById('service_name').value;
            
            if (!serviceName.trim()) {
                e.preventDefault();
                alert('Please enter a service name.');
                return;
            }
            
            if (!price || price <= 0) {
                e.preventDefault();
                alert('Please enter a valid price greater than 0.');
                return;
            }
        });
    </script>
</body>
</html>
