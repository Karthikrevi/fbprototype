
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERP Login - FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    .login-title {
      color: #764ba2;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .login-tabs {
      display: flex;
      margin-bottom: 30px;
      border-radius: 10px;
      overflow: hidden;
      border: 2px solid #e9ecef;
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      border: none;
      background: #f8f9fa;
      color: #6c757d;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .tab-btn.active {
      background: linear-gradient(45deg, #667eea, #764ba2);
      color: white;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    .btn-login {
      background: linear-gradient(45deg, #667eea, #764ba2);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
      margin-top: 15px;
    }
    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
      color: white;
    }
    .register-link {
      text-align: center;
      margin-top: 20px;
      color: #6c757d;
    }
    .register-link a {
      color: #667eea;
      text-decoration: none;
    }
    .back-btn {
      background-color: #6c757d;
      color: white;
      padding: 8px 16px;
      border-radius: 8px;
      text-decoration: none;
      margin-top: 15px;
      display: inline-block;
      text-align: center;
      width: 100%;
    }
    .back-btn:hover {
      background-color: #5a6268;
      color: white;
    }
    .admin-note {
      background: #e3f2fd;
      border: 1px solid #bbdefb;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2 class="login-title">🏢 FurrButler ERP</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="login-tabs">
      <button class="tab-btn active" onclick="switchTab('vendor')">Vendor Login</button>
      <button class="tab-btn" onclick="switchTab('admin')">Admin Login</button>
    </div>

    <!-- Vendor Login Tab -->
    <div id="vendor-tab" class="tab-content active">
      <form method="POST" action="/erp/login">
        <div class="mb-3">
          <label class="form-label">Vendor Email</label>
          <input type="email" class="form-control" name="email" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-login">Login as Vendor</button>
      </form>
      <div class="register-link">
        <p>Don't have a vendor account? <a href="/erp/register">Register here</a></p>
      </div>
    </div>

    <!-- Admin Login Tab -->
    <div id="admin-tab" class="tab-content">
      <div class="admin-note">
        <strong>Admin Access</strong><br>
        <small>Username: <code>furrbutler_admin</code><br>
        Password: <code>admin123</code></small>
      </div>
      <form method="POST" action="/master/admin/login">
        <div class="mb-3">
          <label class="form-label">Admin Username</label>
          <input type="text" class="form-control" name="username" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Admin Password</label>
          <input type="password" class="form-control" name="password" required>
        </div>
        <button type="submit" class="btn btn-login">Login as Admin</button>
      </form>
    </div>

    <a href="/" class="back-btn">← Back to Home</a>
  </div>

  <script>
    function switchTab(tab) {
      // Remove active class from all tabs and content
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      // Add active class to clicked tab and corresponding content
      event.target.classList.add('active');
      document.getElementById(tab + '-tab').classList.add('active');
    }
  </script>
</body>
</html>
