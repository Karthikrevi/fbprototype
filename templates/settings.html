
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - FurrButler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row">
            <div class="col-md-8">
                <h2>⚙️ Account Settings</h2>
                
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>🔐 Privacy & Data (GDPR)</h5>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-6">
                                <h6>📄 Data Export</h6>
                                <p>Download all your personal data stored by FurrButler.</p>
                                <a href="/gdpr/export-data" class="btn btn-outline-primary">Export My Data</a>
                            </div>
                            <div class="col-md-6">
                                <h6>🗑️ Account Deletion</h6>
                                <p>Permanently delete your account and personal data.</p>
                                <a href="/gdpr/delete-account" class="btn btn-outline-danger">Delete Account</a>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="card">
                    <div class="card-header">
                        <h5>📱 General Settings</h5>
                    </div>
                    <div class="card-body">
                        <p>More settings coming soon...</p>
                        <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
