
<!DOCTYPE html>
<html>
<head>
  <title>Checkout - FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Poppins', sans-serif;
    }
    .checkout-container {
      max-width: 1000px;
      margin: 50px auto;
      padding: 0 20px;
    }
    .checkout-header {
      background: white;
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .checkout-content {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 30px;
    }
    .order-summary {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      height: fit-content;
      position: sticky;
      top: 20px;
    }
    .booking-details {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-bottom: 25px;
    }
    .booking-item {
      border-bottom: 1px solid #e9ecef;
      padding: 20px 0;
    }
    .booking-item:last-child {
      border-bottom: none;
    }
    .pet-info {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }
    .pet-avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      object-fit: cover;
    }
    .service-details {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 15px;
      margin-top: 10px;
    }
    .total-section {
      background: #f8f9fa;
      border-radius: 10px;
      padding: 20px;
      margin-top: 20px;
    }
    .btn-book-now {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
      border: none;
      color: white;
      padding: 15px;
      border-radius: 10px;
      font-weight: 600;
      width: 100%;
      font-size: 1.1rem;
    }
    .btn-book-now:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
    }
    @media (max-width: 768px) {
      .checkout-content {
        grid-template-columns: 1fr;
      }
      .order-summary {
        position: relative;
        top: 0;
      }
    }
  </style>
</head>
<body>
  <div class="checkout-container">
    <div class="checkout-header">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h2><i class="fas fa-clipboard-check"></i> Booking Checkout</h2>
          <p class="text-muted mb-0">Review your bookings and confirm</p>
        </div>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">
          <i class="fas fa-arrow-left"></i> Back
        </a>
      </div>
    </div>

    <div class="checkout-content">
      <div class="booking-details-section">
        <div class="booking-details">
          <h4><i class="fas fa-list"></i> Booking Details</h4>
          <div id="bookingItems">
            <!-- Populated by JavaScript -->
          </div>
        </div>
      </div>

      <div class="order-summary">
        <h5><i class="fas fa-receipt"></i> Order Summary</h5>
        <div id="orderSummary">
          <!-- Populated by JavaScript -->
        </div>
        
        <div class="total-section">
          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal:</span>
            <span id="subtotalAmount">$0.00</span>
          </div>
          <div class="d-flex justify-content-between mb-2">
            <span>Service Fee:</span>
            <span id="serviceFee">$2.99</span>
          </div>
          <hr>
          <div class="d-flex justify-content-between mb-3">
            <strong>Total:</strong>
            <strong id="totalAmount">$0.00</strong>
          </div>
          
          <button class="btn-book-now" onclick="confirmBookings()">
            <i class="fas fa-calendar-check"></i> Confirm Bookings
          </button>
        </div>

        <div class="mt-3 text-center">
          <small class="text-muted">
            <i class="fas fa-shield-alt"></i> Secure booking process
          </small>
        </div>
      </div>
    </div>
  </div>

  <script>
    let bookingCart = [];

    document.addEventListener('DOMContentLoaded', function() {
      loadBookingCart();
      displayBookings();
      calculateTotals();
    });

    function loadBookingCart() {
      const cartData = localStorage.getItem('bookingCart');
      if (cartData) {
        bookingCart = JSON.parse(cartData);
      } else {
        // Redirect back if no cart data
        window.location.href = '/groomers';
      }
    }

    function displayBookings() {
      const bookingItems = document.getElementById('bookingItems');
      const orderSummary = document.getElementById('orderSummary');

      if (bookingCart.length === 0) {
        bookingItems.innerHTML = '<p class="text-muted">No bookings in cart</p>';
        return;
      }

      // Group bookings by pet
      const groupedBookings = bookingCart.reduce((groups, booking) => {
        const petId = booking.pet.id;
        if (!groups[petId]) {
          groups[petId] = {
            pet: booking.pet,
            bookings: []
          };
        }
        groups[petId].bookings.push(booking);
        return groups;
      }, {});

      // Display grouped bookings
      bookingItems.innerHTML = Object.values(groupedBookings).map(group => `
        <div class="booking-item">
          <div class="pet-info">
            <img src="${group.pet.photo}" alt="${group.pet.name}" class="pet-avatar">
            <div>
              <h6 class="mb-1">${group.pet.name}</h6>
              <small class="text-muted">${group.pet.breed}</small>
            </div>
          </div>
          
          ${group.bookings.map(booking => `
            <div class="service-details">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <div>
                  <strong>${booking.service}</strong>
                  <div class="text-muted small">
                    <i class="fas fa-clock"></i> ${booking.duration} minutes
                  </div>
                </div>
                <div class="text-success fw-bold">$${booking.price.toFixed(2)}</div>
              </div>
              <div class="text-muted small">
                <i class="fas fa-calendar"></i> ${formatDate(booking.date)} at ${booking.time}
              </div>
            </div>
          `).join('')}
        </div>
      `).join('');

      // Display summary
      orderSummary.innerHTML = bookingCart.map(booking => `
        <div class="d-flex justify-content-between mb-2">
          <span class="small">${booking.service} (${booking.pet.name})</span>
          <span class="small">$${booking.price.toFixed(2)}</span>
        </div>
      `).join('');
    }

    function calculateTotals() {
      const subtotal = bookingCart.reduce((sum, booking) => sum + booking.price, 0);
      const serviceFee = 2.99;
      const total = subtotal + serviceFee;

      document.getElementById('subtotalAmount').textContent = `$${subtotal.toFixed(2)}`;
      document.getElementById('serviceFee').textContent = `$${serviceFee.toFixed(2)}`;
      document.getElementById('totalAmount').textContent = `$${total.toFixed(2)}`;
    }

    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString('en-US', { 
        weekday: 'short', 
        month: 'short', 
        day: 'numeric' 
      });
    }

    async function confirmBookings() {
      if (bookingCart.length === 0) return;

      const confirmButton = document.querySelector('.btn-book-now');
      confirmButton.disabled = true;
      confirmButton.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Processing...';

      try {
        // Process each booking
        for (const booking of bookingCart) {
          const bookingData = {
            vendor_id: '{{ vendor_id }}',  // This would be passed from the backend
            service: booking.service,
            date: booking.date,
            time: booking.time,
            duration: booking.duration,
            pet_name: booking.pet.name,
            pet_parent_name: booking.pet.parent_name || 'Pet Parent',
            pet_parent_phone: booking.pet.parent_phone || '',
            notes: `Booking for ${booking.pet.name} (${booking.pet.breed})`
          };

          const response = await fetch('/api/create-booking', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(bookingData)
          });

          if (!response.ok) {
            throw new Error('Booking failed');
          }
        }

        // Clear cart and redirect
        localStorage.removeItem('bookingCart');
        showSuccess('All bookings confirmed successfully!');
        
        setTimeout(() => {
          window.location.href = '/my-bookings';
        }, 2000);

      } catch (error) {
        console.error('Booking error:', error);
        showError('Booking failed. Please try again.');
        confirmButton.disabled = false;
        confirmButton.innerHTML = '<i class="fas fa-calendar-check"></i> Confirm Bookings';
      }
    }

    function showSuccess(message) {
      const alert = document.createElement('div');
      alert.className = 'alert alert-success position-fixed';
      alert.style = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
      alert.innerHTML = `<i class="fas fa-check"></i> ${message}`;
      document.body.appendChild(alert);
      
      setTimeout(() => {
        alert.remove();
      }, 5000);
    }

    function showError(message) {
      const alert = document.createElement('div');
      alert.className = 'alert alert-danger position-fixed';
      alert.style = 'top: 20px; right: 20px; z-index: 9999; min-width: 300px;';
      alert.innerHTML = `<i class="fas fa-exclamation-triangle"></i> ${message}`;
      document.body.appendChild(alert);
      
      setTimeout(() => {
        alert.remove();
      }, 5000);
    }
  </script>
</body>
</html>
