<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Booking | FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; font-family: 'Segoe UI', sans-serif; }
    .form-header {
      background: linear-gradient(135deg, #4a148c 0%, #7b1fa2 100%);
      color: white; padding: 35px 0; text-align: center;
    }
    .form-header h1 { font-size: 1.8em; margin-bottom: 5px; }
    .form-container {
      max-width: 600px; margin: -30px auto 40px; background: white;
      border-radius: 16px; padding: 35px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: relative; z-index: 1;
    }
    .form-group { margin-bottom: 18px; }
    .form-group label { font-weight: 600; color: #333; margin-bottom: 5px; display: block; font-size: 0.9em; }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px;
      font-size: 0.95em;
    }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
      border-color: #7b1fa2; outline: none;
    }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .btn-save {
      background: #7b1fa2; color: white; border: none; padding: 12px 35px;
      border-radius: 25px; font-size: 1em; font-weight: 600; cursor: pointer;
    }
    .btn-save:hover { background: #6a1b9a; }
    .btn-cancel {
      background: white; color: #666; border: 2px solid #ddd; padding: 12px 35px;
      border-radius: 25px; font-size: 1em; cursor: pointer; text-decoration: none;
    }
    .btn-cancel:hover { border-color: #999; color: #333; }
  </style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <div class="form-header">
    <div class="container">
      <h1>📋 Log Your Booking</h1>
      <p>{{ venue[1] }}</p>
    </div>
  </div>

  <div class="form-container">
    <form method="POST" action="/pet-friendly/{{ venue[0] }}/log-booking">
      <div class="form-group">
        <label>Venue</label>
        <input type="text" value="{{ venue[1] }}" readonly style="background:#f5f5f5;">
      </div>
      <div class="form-group">
        <label>Booking Platform</label>
        <select name="booking_platform">
          <option value="Direct booking">Direct booking</option>
          <option value="Booking.com">Booking.com</option>
          <option value="MakeMyTrip">MakeMyTrip</option>
          <option value="Airbnb">Airbnb</option>
          <option value="Goibibo">Goibibo</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label>Booking Reference</label>
        <input type="text" name="booking_reference" placeholder="e.g. BK-12345678">
      </div>
      {% if pets %}
      <div class="form-group">
        <label>Pet</label>
        <select name="pet_index">
          <option value="">Select pet</option>
          {% for p in pets %}
            <option value="{{ loop.index0 }}">{{ p.name }}</option>
          {% endfor %}
        </select>
      </div>
      {% endif %}
      <div class="row">
        <div class="col-md-6">
          <div class="form-group">
            <label>Check In</label>
            <input type="date" name="check_in_date">
          </div>
        </div>
        <div class="col-md-6">
          <div class="form-group">
            <label>Check Out</label>
            <input type="date" name="check_out_date">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea name="notes" placeholder="Any special arrangements or notes..."></textarea>
      </div>
      <div class="form-group">
        <label>Booking URL (optional)</label>
        <input type="text" name="booking_url" placeholder="https://...">
      </div>
      <div class="d-flex gap-3 justify-content-center" style="margin-top:25px;">
        <button type="submit" class="btn-save">Save Booking</button>
        <a href="/pet-friendly/{{ venue[0] }}" class="btn-cancel">Cancel</a>
      </div>
    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
