<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit {{ employee.name }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Poppins', sans-serif; }
    .container { max-width: 800px; padding: 20px; margin-top: 20px; }
    .form-card { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .back-btn:hover { background: rgba(255,255,255,0.3); color: white; }
  </style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <div class="container">
    <a href="/erp/hr/employees/{{ employee.id }}" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Detail</a>
    <div class="form-card">
      <h3><i class="fas fa-user-edit text-primary"></i> Edit Employee</h3>
      <form method="POST" class="mt-4">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" name="name" value="{{ employee.name }}" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" name="email" value="{{ employee.email or '' }}">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="tel" class="form-control" name="phone" value="{{ employee.phone or '' }}">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Position</label>
            <select class="form-select" name="position" required>
              {% for pos in ['Senior Groomer','Junior Groomer','Receptionist','Manager','Trainee'] %}
              <option value="{{ pos }}" {% if employee.position == pos %}selected{% endif %}>{{ pos }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Base Salary (Monthly)</label>
            <input type="number" class="form-control" name="base_salary" value="{{ employee.base_salary or 0 }}" step="0.01">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Hourly Rate</label>
            <input type="number" class="form-control" name="hourly_rate" value="{{ employee.hourly_rate or 0 }}" step="0.01">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Join Date</label>
            <input type="date" class="form-control" name="join_date" value="{{ employee.join_date or '' }}">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Emergency Contact</label>
            <input type="text" class="form-control" name="emergency_contact" value="{{ employee.emergency_contact or '' }}">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Address</label>
          <textarea class="form-control" name="address" rows="2">{{ employee.address or '' }}</textarea>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Skills</label>
            <input type="text" class="form-control" name="skills" value="{{ employee.skills or '' }}" placeholder="e.g. Dog grooming, Cat handling">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Certifications</label>
            <input type="text" class="form-control" name="certifications" value="{{ employee.certifications or '' }}" placeholder="e.g. Pet First Aid">
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Save Changes</button>
      </form>
    </div>
  </div>
</body>
</html>
