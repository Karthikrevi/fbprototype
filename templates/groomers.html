<!DOCTYPE html>
<html>
<head>
  <title>Groomers & Vendors - FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fffaf0;
      font-family: 'Poppins', sans-serif;
    }
    .container {
      margin-top: 50px;
    }
    .card {
      border: none;
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }
    .card:hover {
      transform: scale(1.02);
    }
    .card-img-top {
      height: 200px;
      object-fit: cover;
      border-top-left-radius: 15px;
      border-top-right-radius: 15px;
    }
    .btn-visit {
      background-color: #ffa94d;
      color: white;
      border: none;
      border-radius: 8px;
    }
    .btn-visit:hover {
      background-color: #ff922b;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">🧼 Groomers & Vendors</h2>
    <div class="row">
      {% for vendor in vendors %}
      <div class="col-md-4 mb-4">
        <div class="card">
          <img src="{{ vendor.image }}" class="card-img-top" alt="Vendor Image">
          <div class="card-body">
            <h5 class="card-title">{{ vendor.name }}</h5>
            <p class="card-text">{{ vendor.description }}</p>
            <a href="{{ url_for('vendor_profile', vendor_id=vendor.id) }}" class="btn btn-visit">Visit Profile</a>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>
  </div>
</body>
</html>
