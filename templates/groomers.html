<!DOCTYPE html>
<html>
<head>
  <title>Groomers & Vendors - FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff8f0;
      font-family: 'Poppins', sans-serif;
    }

    .container {
      max-width: 1000px;
      margin-top: 40px;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .card-img-left {
      border-top-left-radius: 15px;
      border-bottom-left-radius: 15px;
    }

    .card-body {
      padding: 20px;
    }

    .btn-view {
      background-color: #ff922b;
      border: none;
      color: white;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.9rem;
    }

    .btn-view:hover {
      background-color: #ffa94d;
    }

    .rating {
      font-size: 1.2rem;
      color: #ffc107;
    }

    .xp-box {
      font-size: 0.9rem;
      color: #495057;
      margin-top: 5px;
    }

    h2 {
      font-weight: bold;
      color: #495057;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2 class="mb-4">🐶 Groomers & Pet Product Vendors</h2>

    {% for vendor in vendors %}
    <div class="card mb-4 d-flex flex-row overflow-hidden">
      <img src="{{ vendor.image }}" class="card-img-left" style="width: 160px; height: 160px; object-fit: cover;">
      <div class="card-body">
        <h5 class="card-title">{{ vendor.name }}</h5>
        <p class="card-text">{{ vendor.description }}</p>

        <!-- XP / Level / Stars -->
        <div class="rating">
          {% for i in range(1, 6) %}
            {% if i <= vendor.rating %}
              ⭐
            {% else %}
              ☆
            {% endif %}
          {% endfor %}
        </div>
        <div class="xp-box">
          Level {{ vendor.level }} Groomer · {{ vendor.xp }} XP
        </div>

        <a href="/vendor/{{ vendor.id }}" class="btn btn-view mt-3">View Profile</a>
      </div>
    </div>
    {% endfor %}
  </div>
</body>
</html>
