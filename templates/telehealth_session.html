
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telehealth Session - FurrVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        .session-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .video-container {
            background: #000;
            border-radius: 10px;
            min-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }
        
        .session-info {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .session-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .control-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .control-btn.mute {
            background: #dc3545;
            color: white;
        }
        
        .control-btn.video {
            background: #28a745;
            color: white;
        }
        
        .control-btn.end {
            background: #6c757d;
            color: white;
        }
        
        .notes-section {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <div class="session-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="bi bi-camera-video"></i> Telehealth Session</h1>
            <div class="session-timer">
                <span class="badge bg-success">Session Active</span>
                <span id="session-timer">00:00:00</span>
            </div>
        </div>
        
        <div class="session-info">
            <div class="row">
                <div class="col-md-4">
                    <strong>Patient:</strong> {{ session.patient_name }}
                </div>
                <div class="col-md-4">
                    <strong>Owner:</strong> {{ session.owner_name }}
                </div>
                <div class="col-md-4">
                    <strong>Meeting ID:</strong> {{ session.meeting_id }}
                </div>
            </div>
        </div>
        
        <div class="video-container">
            <div class="text-center">
                <i class="bi bi-camera-video-fill" style="font-size: 3rem;"></i>
                <div class="mt-3">Video Call Interface</div>
                <div class="mt-2">
                    <small>In production, integrate with Twilio Video, Zoom API, or WebRTC</small>
                </div>
            </div>
        </div>
        
        <div class="session-controls">
            <button class="control-btn mute" onclick="toggleMute()">
                <i class="bi bi-mic-mute"></i> Mute
            </button>
            <button class="control-btn video" onclick="toggleVideo()">
                <i class="bi bi-camera-video"></i> Video
            </button>
            <button class="control-btn end" onclick="endSession()">
                <i class="bi bi-telephone-x"></i> End Session
            </button>
        </div>
        
        <div class="notes-section">
            <h5>Session Notes & Prescription</h5>
            <div class="row">
                <div class="col-md-8">
                    <div class="mb-3">
                        <label class="form-label">Consultation Notes</label>
                        <textarea class="form-control" id="sessionNotes" rows="6" placeholder="Enter consultation notes, observations, and recommendations..."></textarea>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="mb-3">
                        <label class="form-label">Quick Actions</label>
                        <div class="d-grid gap-2">
                            <button class="btn btn-outline-primary" onclick="addPrescription()">
                                <i class="bi bi-prescription2"></i> Add Prescription
                            </button>
                            <button class="btn btn-outline-info" onclick="scheduleFollowup()">
                                <i class="bi bi-calendar-plus"></i> Schedule Follow-up
                            </button>
                            <button class="btn btn-outline-success" onclick="sendInvoice()">
                                <i class="bi bi-receipt"></i> Send Invoice
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="prescriptionSection" style="display: none;">
                <h6>Digital Prescription</h6>
                <div class="row">
                    <div class="col-md-6">
                        <select class="form-select mb-2" id="medicationSelect">
                            <option value="">Select Medication</option>
                            <option value="1">Antibiotics - Amoxicillin</option>
                            <option value="2">Pain Relief - Carprofen</option>
                            <option value="3">Flea Treatment - Frontline</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <input type="text" class="form-control mb-2" placeholder="Dosage" id="dosage">
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-4">
                        <input type="text" class="form-control mb-2" placeholder="Frequency" id="frequency">
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control mb-2" placeholder="Duration" id="duration">
                    </div>
                    <div class="col-md-4">
                        <input type="number" class="form-control mb-2" placeholder="Quantity" id="quantity">
                    </div>
                </div>
                <textarea class="form-control mb-2" placeholder="Special Instructions" id="instructions"></textarea>
                <button class="btn btn-sm btn-primary" onclick="addPrescriptionItem()">Add Item</button>
            </div>
        </div>
    </div>
    
    <script>
        let sessionStartTime = Date.now();
        let prescriptionItems = [];
        
        // Session timer
        function updateTimer() {
            const elapsed = Date.now() - sessionStartTime;
            const hours = Math.floor(elapsed / 3600000);
            const minutes = Math.floor((elapsed % 3600000) / 60000);
            const seconds = Math.floor((elapsed % 60000) / 1000);
            
            document.getElementById('session-timer').textContent = 
                `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }
        
        setInterval(updateTimer, 1000);
        
        function toggleMute() {
            // Implement mute functionality
            console.log('Toggle mute');
        }
        
        function toggleVideo() {
            // Implement video toggle
            console.log('Toggle video');
        }
        
        function addPrescription() {
            document.getElementById('prescriptionSection').style.display = 'block';
        }
        
        function addPrescriptionItem() {
            const medication = document.getElementById('medicationSelect').value;
            const dosage = document.getElementById('dosage').value;
            const frequency = document.getElementById('frequency').value;
            const duration = document.getElementById('duration').value;
            const quantity = document.getElementById('quantity').value;
            const instructions = document.getElementById('instructions').value;
            
            if (medication && dosage && frequency && duration && quantity) {
                prescriptionItems.push({
                    medication_id: medication,
                    dosage: dosage,
                    frequency: frequency,
                    duration: duration,
                    quantity: quantity,
                    instructions: instructions
                });
                
                // Clear form
                document.getElementById('medicationSelect').value = '';
                document.getElementById('dosage').value = '';
                document.getElementById('frequency').value = '';
                document.getElementById('duration').value = '';
                document.getElementById('quantity').value = '';
                document.getElementById('instructions').value = '';
                
                alert('Prescription item added successfully!');
            } else {
                alert('Please fill in all required fields');
            }
        }
        
        function scheduleFollowup() {
            alert('Follow-up scheduling feature coming soon!');
        }
        
        function sendInvoice() {
            alert('Invoice generation feature coming soon!');
        }
        
        function endSession() {
            if (confirm('Are you sure you want to end this session?')) {
                const sessionNotes = document.getElementById('sessionNotes').value;
                
                fetch('/api/telehealth/end-session', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        appointment_id: {{ session.appointment_id }},
                        session_notes: sessionNotes,
                        prescription_items: prescriptionItems
                    })
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('Session ended successfully!');
                        window.location.href = '/furrvet/telehealth';
                    } else {
                        alert('Error ending session: ' + data.error);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error ending session');
                });
            }
        }
    </script>
</body>
</html>
