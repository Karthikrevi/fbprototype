<!DOCTYPE html>
<html>
<head>
  <title>Vendor Profile - FurrButler ERP</title>
  <style>
    body {
      background-color: #fffef2;
      font-family: 'Poppins', sans-serif;
      padding: 30px;
      margin: 0;
    }

    h2 {
      text-align: center;
      color: #ff7e5f;
      font-size: 2rem;
    }

    form {
      background: white;
      padding: 30px;
      max-width: 600px;
      margin: 30px auto;
      border-radius: 20px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    label {
      display: block;
      margin-top: 20px;
      font-weight: 600;
      color: #333;
    }

    input, textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-top: 6px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    input[readonly] {
      background-color: #f5f5f5;
    }

    button {
      margin-top: 30px;
      background-color: #74c69d;
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #52b788;
    }

    .note {
      font-size: 0.85rem;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h2>🐾 Vendor Profile</h2>

  <form method="POST" action="/erp/profile/save" enctype="multipart/form-data">
    <label>Name</label>
    <input name="name" value="{{ vendor[0] }}" required>

    <label>Email (read-only)</label>
    <input value="{{ vendor[1] }}" readonly>

    <label>Phone</label>
    <input name="phone" value="{{ vendor[2] }}">

    <label>Bio</label>
    <textarea name="bio" rows="4">{{ vendor[3] }}</textarea>

    <label>Category</label>
    <select name="category" required>
      <option value="">Select Category</option>
      <option value="Groomer" {% if vendor[8] == 'Groomer' %}selected{% endif %}>Groomer</option>
      <option value="Boarding" {% if vendor[8] == 'Boarding' %}selected{% endif %}>Boarding</option>
      <option value="Pharmacy" {% if vendor[8] == 'Pharmacy' %}selected{% endif %}>Pharmacy</option>
      <option value="Restaurant" {% if vendor[8] == 'Restaurant' %}selected{% endif %}>Pet-Friendly Restaurant</option>
    </select>

    <label>Profile Image</label>
    <input type="file" name="image" accept="image/*">
    {% if vendor[4] %}
      <div style="margin-top: 10px;">
        <img src="{{ vendor[4] }}" alt="Current Profile" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
        <p style="font-size: 0.8rem; color: #666;">Current profile image</p>
      </div>
    {% endif %}

    <label>City</label>
    <input name="city" value="{{ vendor[5] if vendor[5] else '' }}">

    <p class="note">📍 Location will be automatically detected from your device.</p>

    <button type="submit">💾 Save Profile</button>
  </form>

  <script>
    window.onload = function() {
      if ("geolocation" in navigator && !sessionStorage.getItem('vendorLocationSet')) {
        navigator.geolocation.getCurrentPosition(function(position) {
          fetch(`/set-vendor-location?lat=${position.coords.latitude}&lon=${position.coords.longitude}`)
            .then(() => {
              sessionStorage.setItem('vendorLocationSet', 'true');
              console.log('Vendor location updated automatically');
            });
        }, function(error) {
          console.log("Geolocation error:", error);
        });
      }
    };
  </script>
</body>
</html>
