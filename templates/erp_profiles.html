<!DOCTYPE html>
<html>
<head>
  <title>Vendor Profile - FurrButler ERP</title>
  <style>
    body {
      background-color: #fffaf2;
      font-family: 'Poppins', sans-serif;
      padding: 30px;
    }

    h2 {
      color: #ff7e5f;
    }

    form {
      background: white;
      padding: 25px;
      max-width: 600px;
      margin: auto;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ddd;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      background-color: #74c69d;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #52b788;
    }
  </style>
</head>
<body>
  <h2>🐾 Vendor Profile</h2>
  <form method="POST">
    <label>Name</label>
    <input name="name" value="{{ vendor[0] }}">

    <label>Email (read-only)</label>
    <input value="{{ vendor[1] }}" readonly>

    <label>Phone</label>
    <input name="phone" value="{{ vendor[2] }}">

    <label>Bio</label>
    <textarea name="bio">{{ vendor[3] }}</textarea>

    <label>Image URL</label>
    <input name="image_url" value="{{ vendor[4] }}">

    <label>City</label>
    <input name="city" value="{{ vendor[5] }}">

    <label>Latitude</label>
    <input name="latitude" value="{{ vendor[6] }}">

    <label>Longitude</label>
    <input name="longitude" value="{{ vendor[7] }}">

    <button type="submit">Save Profile</button>
  </form>
</body>
</html>
