
<!DOCTYPE html>
<html>
<head>
    <title>Add Stock - FurrButler ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            margin-top: 50px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 800px;
        }
        .form-control, .form-select {
            border-radius: 10px;
            border: 2px solid #e9ecef;
            padding: 12px 15px;
            transition: all 0.3s ease;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            margin-bottom: 20px;
            display: inline-block;
        }
        .cost-calculator {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <a href="/erp/inventory" class="back-btn ms-3 mt-3">
        <i class="fas fa-arrow-left"></i> Back to Inventory
    </a>

    <div class="container">
        <div class="text-center mb-4">
            <h1 class="display-5">
                <i class="fas fa-plus-circle"></i> Add Stock
            </h1>
            <p class="lead">Receive new inventory with complete tracking</p>
        </div>

        <form method="POST" action="/erp/inventory/add-stock">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-box"></i> Product
                        </label>
                        <select name="product_id" class="form-select" required onchange="updateProductInfo()">
                            <option value="">Select Product</option>
                            {% for product in products %}
                            <option value="{{ product[0] }}" 
                                    data-name="{{ product[1] }}" 
                                    data-current="{{ product[2] }}" 
                                    data-cost="{{ product[3] }}">
                                {{ product[1] }} (Current: {{ product[2] }} units)
                            </option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-hashtag"></i> Quantity to Add
                        </label>
                        <input type="number" name="quantity" class="form-control" 
                               min="1" required oninput="calculateTotal()">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-rupee-sign"></i> Unit Cost (₹)
                        </label>
                        <input type="number" name="unit_cost" class="form-control" 
                               step="0.01" min="0" required oninput="calculateTotal()">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-truck"></i> Supplier
                        </label>
                        <input type="text" name="supplier" class="form-control" 
                               placeholder="Supplier name">
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-barcode"></i> Batch Number
                        </label>
                        <input type="text" name="batch_number" class="form-control" 
                               placeholder="Batch/Lot number">
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">
                            <i class="fas fa-map-marker-alt"></i> Storage Location
                        </label>
                        <select name="location" class="form-select">
                            <option value="Main Warehouse">Main Warehouse</option>
                            <option value="Secondary Storage">Secondary Storage</option>
                            <option value="Display Area">Display Area</option>
                            <option value="Cold Storage">Cold Storage</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Cost Calculator -->
            <div class="cost-calculator">
                <h5><i class="fas fa-calculator"></i> Cost Summary</h5>
                <div class="row">
                    <div class="col-md-4">
                        <strong>Quantity:</strong> <span id="calc-quantity">0</span> units
                    </div>
                    <div class="col-md-4">
                        <strong>Unit Cost:</strong> ₹<span id="calc-unit-cost">0.00</span>
                    </div>
                    <div class="col-md-4">
                        <strong>Total Cost:</strong> ₹<span id="calc-total">0.00</span>
                    </div>
                </div>
                <div class="mt-2">
                    <small class="text-muted">
                        <i class="fas fa-info-circle"></i> 
                        This cost will be automatically recorded in your inventory and expense accounts.
                    </small>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-check"></i> Add Stock to Inventory
                </button>
            </div>
        </form>
    </div>

    <script>
        function updateProductInfo() {
            const select = document.querySelector('select[name="product_id"]');
            const selectedOption = select.options[select.selectedIndex];
            
            if (selectedOption.value) {
                const currentCost = selectedOption.getAttribute('data-cost');
                document.querySelector('input[name="unit_cost"]').value = currentCost || '';
                calculateTotal();
            }
        }

        function calculateTotal() {
            const quantity = document.querySelector('input[name="quantity"]').value || 0;
            const unitCost = document.querySelector('input[name="unit_cost"]').value || 0;
            const total = quantity * unitCost;

            document.getElementById('calc-quantity').textContent = quantity;
            document.getElementById('calc-unit-cost').textContent = parseFloat(unitCost).toFixed(2);
            document.getElementById('calc-total').textContent = total.toFixed(2);
        }
    </script>
</body>
</html>
