<!DOCTYPE html>
<html>
<head>
  <title>Manage Bookings - FurrButler ERP</title>
  <style>
    body {
      background-color: #fffaf2;
      font-family: 'Poppins', sans-serif;
      padding: 40px;
      margin: 0;
    }

    h2 {
      color: #ff7e5f;
      text-align: center;
      margin-bottom: 20px;
    }

    .summary {
      text-align: center;
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #333;
    }

    .search-bar {
      text-align: center;
      margin-bottom: 25px;
    }

    .search-bar input[type="text"] {
      padding: 8px 12px;
      width: 300px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
    }

    .search-bar button {
      padding: 8px 16px;
      margin-left: 8px;
      background-color: #74c69d;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      overflow: hidden;
    }

    th, td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid #eee;
    }

    th {
      background-color: #ff7e5f;
      color: white;
    }

    td button {
      padding: 6px 10px;
      margin-right: 5px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .complete-btn {
      background-color: #4caf50;
      color: white;
    }

    .cancel-btn {
      background-color: #e63946;
      color: white;
    }

    .pagination {
      margin-top: 30px;
      text-align: center;
    }

    .pagination a {
      margin: 0 6px;
      padding: 6px 12px;
      background-color: #eee;
      border-radius: 6px;
      text-decoration: none;
      color: #333;
    }

    .pagination a:hover {
      background-color: #ccc;
    }
  </style>
</head>
<body>
  <h2>📅 Booking Management</h2>

  <div class="summary">
    Total Bookings: {{ bookings|length }}
  </div>

  <div class="search-bar">
    <form method="GET">
      <input type="text" name="search" placeholder="Search by Pet, Service, or Date...">
      <button type="submit">Search</button>
    </form>
  </div>

  <table>
    <tr>
      <th>Pet</th>
      <th>Service</th>
      <th>Date</th>
      <th>Duration</th>
      <th>Status</th>
      <th>Actions</th>
    </tr>
    {% for booking in bookings %}
    <tr>
      <td>{{ booking[1] }}</td>
      <td>{{ booking[2] }}</td>
      <td>{{ booking[3] }}</td>
      <td>{{ booking[4] }}</td>
      <td>{{ booking[5] }}</td>
      <td>
        <form method="POST" action="/erp/bookings/update/{{ booking[0] }}" style="display: inline-block;">
          <select name="status" onchange="this.form.submit()" style="padding: 5px 8px; border-radius: 5px; border: 1px solid #ccc; font-size: 0.8rem;">
            <option value="{{ booking[6] }}" selected>Current: {{ booking[6].title() }}</option>
            <option value="confirmed">✅ Confirmed</option>
            <option value="waiting">🕐 Waiting</option>
            <option value="grooming">✂️ Grooming</option>
            <option value="almost-done">🎯 Almost Done</option>
            <option value="ready">🎉 Ready for Pickup</option>
            <option value="completed">✨ Completed</option>
            <option value="cancelled">❌ Cancelled</option>
          </select>
        </form>
      </td>
    </tr>
    {% endfor %}
  </table>

  <div class="pagination">
    <a href="?page=1">1</a>
    <a href="?page=2">2</a>
    <a href="?page=3">3</a>
  </div>
</body>
</html>
