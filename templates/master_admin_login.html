
<!DOCTYPE html>
<html>
<head>
  <title>FurrButler Admin - Master Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    .admin-login-card {
      background: white;
      border-radius: 20px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
    }
    .admin-title {
      color: #764ba2;
      text-align: center;
      margin-bottom: 30px;
      font-weight: 600;
    }
    .btn-admin {
      background: linear-gradient(45deg, #667eea, #764ba2);
      border: none;
      color: white;
      padding: 12px;
      border-radius: 10px;
      width: 100%;
      font-weight: 500;
    }
    .btn-admin:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(118, 75, 162, 0.3);
    }
  </style>
</head>
<body>
  <div class="admin-login-card">
    <h2 class="admin-title">🔐 FurrButler Master Admin</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert alert-danger">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    
    <div class="alert alert-info">
      <small>
        <strong>Default Credentials:</strong><br>
        Username: <code>furrbutler_admin</code><br>
        Password: <code>admin123</code>
      </small>
    </div>
    
    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Admin Username</label>
        <input type="text" class="form-control" name="username" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Admin Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button type="submit" class="btn btn-admin">Access Admin Dashboard</button>
    </form>
    
    <div class="text-center mt-3">
      <small class="text-muted">For platform owners only</small>
    </div>
  </div>
</body>
</html>
