<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register New Stray - NGO Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            padding: 20px 0;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e9ecef;
        }
        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }
        .btn-submit {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 10px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>🐕 Register New Stray Dog</h2>
            <a href="/ngo/dashboard" class="btn btn-outline-secondary">← Back to Dashboard</a>
        </div>

        <form method="POST" enctype="multipart/form-data">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="photo" class="form-label">Stray Photo <span class="text-danger">*</span></label>
                    <input type="file" class="form-control" id="photo" name="photo" accept="image/*" required>
                    <div class="form-text">Clear photo showing the collar and visible tag</div>
                </div>
                <div class="col-md-6 mb-3">
                    <label for="location_address" class="form-label">Location Address</label>
                    <textarea class="form-control" id="location_address" name="location_address" rows="3" placeholder="Describe the location where the stray was found"></textarea>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label for="breed_type" class="form-label">Breed Type</label>
                    <input type="text" class="form-control" id="breed_type" name="breed_type" placeholder="e.g., Mixed breed, German Shepherd">
                </div>
                <div class="col-md-4 mb-3">
                    <label for="gender" class="form-label">Gender</label>
                    <select class="form-control" id="gender" name="gender">
                        <option value="">Select Gender</option>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label for="age_estimation" class="form-label">Age Estimation</label>
                    <input type="text" class="form-control" id="age_estimation" name="age_estimation" placeholder="e.g., 2-3 years, Puppy">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="fur_color" class="form-label">Fur Color</label>
                    <input type="text" class="form-control" id="fur_color" name="fur_color" placeholder="e.g., Brown and white, Black">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="temperament" class="form-label">Temperament</label>
                    <select class="form-control" id="temperament" name="temperament">
                        <option value="">Select Temperament</option>
                        <option value="Friendly">Friendly (Green Collar)</option>
                        <option value="Cautious">Cautious (Yellow Collar)</option>
                        <option value="Aggressive">Aggressive (Red Collar)</option>
                        <option value="Unknown">Unknown</option>
                    </select>
                </div>
            </div>

            <div class="mb-3">
                <label for="distinctive_marks" class="form-label">Distinctive Marks</label>
                <textarea class="form-control" id="distinctive_marks" name="distinctive_marks" rows="3" placeholder="Any unique features, scars, markings that help identify this stray"></textarea>
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label for="location_latitude" class="form-label">Latitude (GPS)</label>
                    <input type="number" step="any" class="form-control" id="location_latitude" name="location_latitude" placeholder="Auto-filled or manual entry">
                </div>
                <div class="col-md-6 mb-3">
                    <label for="location_longitude" class="form-label">Longitude (GPS)</label>
                    <input type="number" step="any" class="form-control" id="location_longitude" name="location_longitude" placeholder="Auto-filled or manual entry">
                </div>
            </div>

            <div class="text-center">
                <button type="button" class="btn btn-outline-primary me-2" onclick="getLocation()">📍 Get Current Location</button>
                <button type="submit" class="btn btn-submit">Register Stray Dog</button>
            </div>
        </form>
    </div>

    <script>
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(position) {
                    document.getElementById('location_latitude').value = position.coords.latitude;
                    document.getElementById('location_longitude').value = position.coords.longitude;
                    alert('Location captured successfully!');
                }, function(error) {
                    alert('Error getting location: ' + error.message);
                });
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
