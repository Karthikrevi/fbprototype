
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module Subscription - FurrButler ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white text-center">
                        <h3><i class="fas fa-credit-card"></i> Module Subscription</h3>
                    </div>
                    <div class="card-body text-center">
                        <h4 class="mb-4">Subscribe to {{ module_name|replace('_', ' ')|title }}</h4>
                        
                        <div class="alert alert-info">
                            <i class="fas fa-info-circle"></i>
                            <strong>Payment Integration Coming Soon!</strong><br>
                            We're setting up secure payment processing with Razorpay.
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6">
                                <div class="card border-primary">
                                    <div class="card-header bg-light">
                                        <h5>Monthly Plan</h5>
                                    </div>
                                    <div class="card-body">
                                        <h3>{{ vendor_currency }}29.99<small class="text-muted">/month</small></h3>
                                        <button class="btn btn-primary" disabled>
                                            <i class="fas fa-shopping-cart"></i> Subscribe Monthly
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="card border-success">
                                    <div class="card-header bg-light">
                                        <h5>Annual Plan <span class="badge bg-success">Save 17%</span></h5>
                                    </div>
                                    <div class="card-body">
                                        <h3>{{ vendor_currency }}299.99<small class="text-muted">/year</small></h3>
                                        <button class="btn btn-success" disabled>
                                            <i class="fas fa-shopping-cart"></i> Subscribe Yearly
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mt-4">
                            <a href="/erp/modules" class="btn btn-secondary">
                                <i class="fas fa-arrow-left"></i> Back to Modules
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
