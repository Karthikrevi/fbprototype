
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Service - FurrButler ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Poppins', sans-serif;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            margin-bottom: 2rem;
        }
        .form-container {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-label {
            font-weight: 600;
            color: #495057;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #dee2e6;
            padding: 0.75rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-save {
            background: linear-gradient(45deg, #28a745, #20c997);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.3);
            color: white;
        }
        .price-preview {
            background-color: #e8f5e8;
            border: 1px solid #28a745;
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="mb-0">➕ Add New Service</h1>
                    <p class="mb-0">Create a new service offering for your customers</p>
                </div>
                <a href="/erp/services" class="btn btn-outline-light">← Back to Services</a>
            </div>
        </div>
    </div>

    <div class="container">
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ 'success' if category == 'message' else category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="form-container">
            <form method="POST" id="serviceForm">
                <div class="mb-4">
                    <label for="service_name" class="form-label">Service Name *</label>
                    <input type="text" class="form-control" id="service_name" name="service_name" required 
                           placeholder="e.g., Full Grooming Package, Nail Trimming, Health Checkup">
                </div>

                <div class="mb-4">
                    <label for="category" class="form-label">Category</label>
                    <select class="form-select" id="category" name="category">
                        <option value="Grooming">Grooming</option>
                        <option value="Health Care">Health Care</option>
                        <option value="Boarding">Boarding</option>
                        <option value="Training">Training</option>
                        <option value="Consultation">Consultation</option>
                        <option value="Emergency">Emergency</option>
                        <option value="General" selected>General</option>
                    </select>
                </div>

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label for="price" class="form-label">Price (₹) *</label>
                        <input type="number" class="form-control" id="price" name="price" step="0.01" min="0" required 
                               placeholder="0.00" oninput="updatePreview()">
                    </div>
                    <div class="col-md-6">
                        <label for="duration_minutes" class="form-label">Duration (minutes)</label>
                        <select class="form-select" id="duration_minutes" name="duration_minutes">
                            <option value="15">15 minutes</option>
                            <option value="30">30 minutes</option>
                            <option value="45">45 minutes</option>
                            <option value="60" selected>1 hour</option>
                            <option value="90">1.5 hours</option>
                            <option value="120">2 hours</option>
                            <option value="180">3 hours</option>
                            <option value="240">4 hours</option>
                            <option value="480">8 hours (Full day)</option>
                            <option value="1440">24 hours (Overnight)</option>
                        </select>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="description" class="form-label">Service Description</label>
                    <textarea class="form-control" id="description" name="description" rows="4" 
                              placeholder="Describe what's included in this service, any special features, or important notes for customers..."></textarea>
                    <div class="form-text">Help customers understand what they'll get with this service.</div>
                </div>

                <div class="price-preview mb-4" id="pricePreview" style="display: none;">
                    <h5 class="text-success mb-1">Service Preview</h5>
                    <div class="h4 text-success mb-0">₹<span id="previewPrice">0.00</span></div>
                    <small class="text-muted">for <span id="previewDuration">60</span> minutes</small>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-save btn-lg">
                        💾 Save Service
                    </button>
                    <a href="/erp/services" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updatePreview() {
            const price = document.getElementById('price').value;
            const duration = document.getElementById('duration_minutes').value;
            const preview = document.getElementById('pricePreview');
            
            if (price && price > 0) {
                document.getElementById('previewPrice').textContent = parseFloat(price).toFixed(2);
                document.getElementById('previewDuration').textContent = duration;
                preview.style.display = 'block';
            } else {
                preview.style.display = 'none';
            }
        }

        // Update duration in preview when changed
        document.getElementById('duration_minutes').addEventListener('change', updatePreview);

        // Form validation
        document.getElementById('serviceForm').addEventListener('submit', function(e) {
            const price = document.getElementById('price').value;
            const serviceName = document.getElementById('service_name').value;
            
            if (!serviceName.trim()) {
                e.preventDefault();
                alert('Please enter a service name.');
                return;
            }
            
            if (!price || price <= 0) {
                e.preventDefault();
                alert('Please enter a valid price greater than 0.');
                return;
            }
        });
    </script>
</body>
</html>
