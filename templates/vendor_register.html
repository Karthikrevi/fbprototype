<!DOCTYPE html>
<html>
<head>
  <title>Vendor Registration - FurrButler ERP</title>
  <style>
    body {
      background-color: #fffaf2;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h2 {
      color: #ff7e5f;
      margin-bottom: 20px;
    }

    form {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 500px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, select, textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      margin-top: 5px;
    }

    button {
      margin-top: 20px;
      background-color: #74c69d;
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
    }

    button:hover {
      background-color: #52b788;
    }
  </style>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <h2>🐾 Vendor Registration</h2>
  <form method="POST">
    <label for="name">Business Name</label>
    <input type="text" name="name" required>

    <label for="email">Email</label>
    <input type="email" name="email" required>

    <label for="password">Password</label>
    <input type="password" name="password" required>

    <label for="category">Category</label>
    <select name="category" required>
      <option value="grooming">Grooming</option>
      <option value="boarding">Boarding</option>
      <option value="restaurant">Restaurant</option>
      <option value="hotel">Hotel</option>
    </select>

    <label for="address">Business Address</label>
    <input type="text" name="address" placeholder="Street address, building number" required>

    <label for="city">City</label>
    <input type="text" name="city" required>

    <label for="state">State</label>
    <input type="text" name="state" required>

    <label for="pincode">PIN Code</label>
    <input type="text" name="pincode" pattern="[0-9]{6}" placeholder="6-digit PIN code" required>

    <label for="phone">Phone</label>
    <input type="text" name="phone" required>

    <div style="margin-top: 20px; padding: 15px; background-color: #f8f9fa; border-radius: 8px;">
      <label style="display: flex; align-items: center; gap: 10px;">
        <input type="checkbox" id="autoLocation" checked>
        <span>Auto-detect location coordinates from address</span>
      </label>
      <small style="color: #666; margin-top: 5px; display: block;">
        We'll automatically find your coordinates for map services. You can also enter them manually below.
      </small>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px;">
      <div>
        <label for="latitude">Latitude (optional)</label>
        <input type="number" name="latitude" step="any" placeholder="e.g., 8.5241">
      </div>
      <div>
        <label for="longitude">Longitude (optional)</label>
        <input type="number" name="longitude" step="any" placeholder="e.g., 76.9366">
      </div>
    </div>

    <label for="bio">About Your Business</label>
    <textarea name="bio" rows="3"></textarea>

    <label for="image_url">Logo/Image URL</label>
    <input type="text" name="image_url">

    <div style="margin-top:15px;">
      <label style="display:flex;align-items:flex-start;gap:10px;font-weight:normal;">
        <input type="checkbox" name="gdpr_consent" required style="margin-top:4px;">
        <span>I agree to the <a href="/privacy-policy" target="_blank">Privacy Policy</a> and <a href="/terms" target="_blank">Terms of Service</a></span>
      </label>
    </div>

    <button type="submit">Register Vendor</button>
  </form>
</body>
</html>
