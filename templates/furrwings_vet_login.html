<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - FurrWings Vet Portal</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0a1628 0%,#1a3a6c 50%,#2c5aa0 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif}
.login-card{background:white;border-radius:1.5rem;padding:2.5rem;max-width:420px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.3)}
.fw-logo{text-align:center;margin-bottom:2rem}
.fw-logo i{color:#2c5aa0;font-size:3rem;margin-bottom:0.5rem;display:block}
.fw-logo h1{color:#1a3a6c;font-weight:800;margin:0}
.fw-logo p{color:#6b7280;margin-top:0.25rem}
.btn-fw{background:#2c5aa0;color:white;border:none;border-radius:0.75rem;padding:0.75rem;font-weight:600;width:100%;font-size:1.05rem}
.btn-fw:hover{background:#1a3a6c;color:white}
.form-control{border-radius:0.5rem;padding:0.75rem}
.links{text-align:center;margin-top:1.5rem;font-size:0.9rem}
.links a{color:#2c5aa0;text-decoration:none}
.links a:hover{text-decoration:underline}
.divider{display:flex;align-items:center;margin:1rem 0}.divider::before,.divider::after{content:'';flex:1;border-bottom:1px solid #e5e7eb}.divider span{padding:0 0.5rem;color:#9ca3af;font-size:0.85rem}
</style>
</head>
<body>
<div class="login-card">
<div class="fw-logo">
<i class="fas fa-plane-departure"></i>
<h1>FurrWings</h1>
<p>Veterinary Portal</p>
</div>
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-warning alert-sm" style="font-size:0.9rem">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="mb-3"><label class="form-label fw-bold">Email</label><input type="email" name="email" class="form-control" required placeholder="your@email.com"></div>
<div class="mb-3"><label class="form-label fw-bold">Password</label><input type="password" name="password" class="form-control" required></div>
<button type="submit" class="btn-fw"><i class="fas fa-sign-in-alt"></i> Sign In</button>
</form>
<div class="links">
<a href="/furrwings/vet/register">Apply to become a FurrWings Vet</a>
<div class="divider"><span>or</span></div>
<a href="/furrvet/login" style="color:#00897b"><i class="fas fa-stethoscope"></i> FurrVet ERP Login</a>
</div>
</div>
</body>
</html>
