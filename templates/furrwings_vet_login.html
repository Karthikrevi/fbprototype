<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FurrWings Vet Connect — Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:#fff;border-radius:12px;box-shadow:0 2px 8px rgba(0,0,0,0.08);max-width:420px;width:100%;padding:40px 36px}
.brand{text-align:center;margin-bottom:28px}
.brand-icon{font-size:28px;margin-bottom:6px}
.brand h1{font-size:20px;color:#0d47a1;font-weight:700;margin-bottom:4px}
.brand p{font-size:13px;color:#616161}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:#616161;margin-bottom:6px}
.form-group input{width:100%;padding:10px 14px;border:1px solid #e0e0e0;border-radius:8px;font-size:14px;color:#212121;transition:border .2s}
.form-group input:focus{outline:none;border-color:#1565c0;box-shadow:0 0 0 3px rgba(21,101,192,0.1)}
.password-wrap{position:relative}
.password-wrap input{padding-right:42px}
.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#616161;cursor:pointer;font-size:13px;font-weight:500}
.error-msg{background:#fce4ec;color:#c62828;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px}
.btn-primary{display:block;width:100%;padding:12px;background:#1565c0;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:#0d47a1}
.divider{border:none;border-top:1px solid #e0e0e0;margin:24px 0}
.links{text-align:center}
.links p{font-size:13px;color:#616161;margin-bottom:8px}
.links a{color:#1565c0;text-decoration:none;font-weight:500;font-size:13px}
.links a:hover{text-decoration:underline}
.alt-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.alt-links a{color:#616161;font-size:12px;font-weight:500}
.alt-links a:hover{color:#1565c0}
</style>
</head>
<body>
<div class="login-card">
    <div class="brand">
        <div class="brand-icon">🐾🩺</div>
        <h1>FurrWings Vet Connect</h1>
        <p>Connecting vets and pet parents</p>
    </div>
    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}
    <form method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="you@clinic.com" autocomplete="email">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div class="password-wrap">
                <input type="password" id="password" name="password" required placeholder="Enter password" autocomplete="current-password">
                <button type="button" class="pw-toggle" onclick="togglePw()">Show</button>
            </div>
        </div>
        <button type="submit" class="btn-primary">Sign In</button>
    </form>
    <hr class="divider">
    <div class="links">
        <p>New to FurrWings Vet Connect?</p>
        <a href="/furrwings/vet/register">Apply for Access</a>
    </div>
    <hr class="divider">
    <div class="links">
        <p>Not a vet?</p>
        <a href="/">Back to Home</a>
        <div class="alt-links">
            <a href="/login">Pet Parent Login</a>
            <a href="/erp/login">Vendor Login</a>
            <a href="/furrvet/login">FurrVet ERP</a>
        </div>
    </div>
</div>
<script>
function togglePw(){
    const p=document.getElementById('password');
    const b=document.querySelector('.pw-toggle');
    if(p.type==='password'){p.type='text';b.textContent='Hide'}
    else{p.type='password';b.textContent='Show'}
}
</script>
</body>
</html>
