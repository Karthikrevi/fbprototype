<!DOCTYPE html>
<html>
<head>
    <title>Transfer Stock - FurrButler ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 60px 40px;
            margin-top: 80px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            text-align: center;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
        }
        .icon-wrap {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 20px;
        }
    </style>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
    <a href="/erp/inventory" class="back-btn ms-3 mt-3">
        <i class="fas fa-arrow-left"></i> Back to Inventory
    </a>

    <div class="container">
        <div class="icon-wrap">
            <i class="fas fa-exchange-alt"></i>
        </div>
        <h2>Transfer Stock &mdash; Coming Soon</h2>
        <p class="lead text-muted mt-3">
            This feature allows you to move stock between your locations.
        </p>
        <p class="text-muted">
            Available when multi-location support launches.
        </p>
        <a href="/erp/inventory" class="btn btn-primary btn-lg mt-3">
            <i class="fas fa-arrow-left"></i> Back to Inventory
        </a>
    </div>
</body>
</html>
