<!DOCTYPE html>
<html>
<head>
  <title>ERP Dashboard - FurrButler</title>
  <style>
    body {
      background-color: #fffef2;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      padding: 40px;
      text-align: center;
    }

    h2 {
      color: #ff7e5f;
    }

    .card-grid {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 30px;
      gap: 20px;
    }

    .card {
      background-color: #ffffff;
      padding: 25px;
      border-radius: 15px;
      width: 220px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      transition: transform 0.2s;
      text-decoration: none;
      color: black;
    }

    .card:hover {
      transform: scale(1.03);
      background-color: #f7f7f7;
    }

    .card h3 {
      margin: 0;
      font-size: 1.2rem;
      color: #74c69d;
    }

    .card p {
      font-size: 0.95rem;
      color: #555;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <h2>Welcome to Your ERP, {{ vendor }}</h2>

  <div class="card-grid">
    <a href="/erp/profile" class="card">
      <h3>👤 Profile</h3>
      <p>View and update your vendor information</p>
    </a>
    <a href="/erp/products" class="card">
      <h3>📦 Inventory</h3>
      <p>Manage your stock & product listings</p>
    </a>
    <a href="/erp/bookings" class="card">
      <h3>📅 Bookings</h3>
      <p>View and manage customer appointments</p>
    </a>
    <a href="/erp/receipts" class="card">
      <h3>🧾 Receipts</h3>
      <p>Track past receipts & sales</p>
    </a>
    <a href="/erp/logout" class="card">
      <h3>🚪 Logout</h3>
      <p>End your session</p>
    </a>
  </div>
</body>
</html>
