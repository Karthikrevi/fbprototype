<!DOCTYPE html>
<html>
<head>
  <title>{{ vendor.name }} - Vendor Profile</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    .vendor-profile {
      max-width: 800px;
      margin: auto;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
      overflow: hidden;
      font-family: sans-serif;
    }

    .vendor-header {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      padding: 20px;
      gap: 20px;
    }

    .vendor-header img {
      width: 250px;
      height: auto;
      border-radius: 12px;
    }

    .vendor-info {
      flex: 1;
    }

    .vendor-info h1 {
      margin: 0;
      font-size: 24px;
    }

    .vendor-meta {
      font-size: 14px;
      color: #666;
      margin-top: 10px;
    }

    .services-list {
      margin: 20px;
      padding-left: 20px;
    }

    .vendor-actions {
      margin: 20px;
      display: flex;
      gap: 15px;
    }

    .vendor-actions a {
      padding: 10px 20px;
      background-color: #ff7e5f;
      color: white;
      border-radius: 8px;
      text-decoration: none;
    }

    .vendor-actions a:hover {
      background-color: #ff5722;
    }

    .xp-bar {
      margin-top: 10px;
      height: 10px;
      background: #eee;
      border-radius: 5px;
      overflow: hidden;
    }

    .xp-fill {
      width: {{ vendor.xp / 100 }}%;
      height: 100%;
      background: #4caf50;
    }

  </style>
</head>
<body>
  <div class="vendor-profile">
    <div class="vendor-header">
      <img src="{{ vendor.image }}" alt="{{ vendor.name }}">
      <div class="vendor-info">
        <h1>{{ vendor.name }}</h1>
        <p class="vendor-meta">{{ vendor.description }}</p>
        <p class="vendor-meta">Rating: {{ vendor.rating }} ⭐</p>
        <p class="vendor-meta">Level: {{ vendor.level }}</p>
        <p class="vendor-meta">XP: {{ vendor.xp }}</p>
        <div class="xp-bar">
          <div class="xp-fill"></div>
        </div>
      </div>
    </div>

    <div class="services-list">
      <h3>Services Offered</h3>
      <ul>
        {% for service in vendor.services %}
        <li>{{ service }}</li>
        {% endfor %}
      </ul>
    </div>

    <div class="vendor-actions">
      <a href="{{ vendor.market_url }}">Visit Marketplace</a>
      <a href="{{ vendor.booking_url }}">Book a Service</a>
    </div>
  </div>
</body>
</html>
