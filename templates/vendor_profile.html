<!DOCTYPE html>
<html>
<head>
  <title>{{ vendor.name }} - FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #fff9f0;
      font-family: 'Poppins', sans-serif;
    }
    .container {
      margin-top: 40px;
    }
    .profile-card {
      border-radius: 15px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      padding: 20px;
      background: white;
    }
    .vendor-img {
      width: 100%;
      border-radius: 15px;
      object-fit: cover;
    }
    .btn-book, .btn-market {
      border-radius: 10px;
      padding: 10px 20px;
      font-weight: bold;
      margin-right: 10px;
    }
    .btn-book {
      background-color: #74c69d;
      color: white;
    }
    .btn-market {
      background-color: #ffa94d;
      color: white;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="profile-card">
      <img src="{{ vendor.image }}" class="vendor-img mb-3" alt="Vendor Image">
      <h2>{{ vendor.name }}</h2>
      <p class="text-muted">{{ vendor.description }}</p>
      <h5 class="mt-4">Services Offered:</h5>
      <ul>
        {% for service in vendor.services %}
        <li>{{ service }}</li>
        {% endfor %}
      </ul>
      <div class="mt-4">
        <a href="{{ vendor.booking_url }}" class="btn btn-book">Book Now</a>
        <a href="{{ vendor.market_url }}" class="btn btn-market">Visit Marketplace</a>
      </div>
    </div>
  </div>
</body>
</html>
