<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Invoice - FurrButler ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      color: #333;
    }
    .page-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 30px 20px;
    }
    .page-header {
      background: rgba(255,255,255,0.95);
      padding: 25px 30px;
      border-radius: 15px;
      margin-bottom: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .page-header h2 {
      margin: 0;
      font-weight: 700;
      color: #4a3f8a;
    }
    .card-section {
      background: rgba(255,255,255,0.95);
      border-radius: 15px;
      padding: 30px;
      margin-bottom: 25px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.1);
    }
    .card-section h5 {
      font-weight: 600;
      color: #4a3f8a;
      margin-bottom: 20px;
    }
    .form-label {
      font-weight: 500;
      color: #555;
    }
    .form-control, .form-select {
      border-radius: 10px;
      border: 1px solid #ddd;
      padding: 10px 14px;
    }
    .form-control:focus, .form-select:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 0.2rem rgba(102,126,234,0.25);
    }
    .btn-primary-custom {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border: none;
      color: white;
      padding: 10px 30px;
      border-radius: 10px;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn-primary-custom:hover {
      opacity: 0.9;
      color: white;
    }
    .btn-back {
      background: rgba(255,255,255,0.2);
      color: white;
      border: 2px solid rgba(255,255,255,0.4);
      padding: 8px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }
    .btn-back:hover {
      background: rgba(255,255,255,0.3);
      color: white;
    }
    .btn-add-item {
      background: #28a745;
      border: none;
      color: white;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-add-item:hover { opacity: 0.9; }
    .btn-remove {
      background: #dc3545;
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-remove:hover { opacity: 0.9; }
    .line-items-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    .line-items-table th {
      background: #f0edff;
      color: #4a3f8a;
      font-weight: 600;
      padding: 12px 15px;
      border: none;
    }
    .line-items-table th:first-child { border-radius: 10px 0 0 0; }
    .line-items-table th:last-child { border-radius: 0 10px 0 0; }
    .line-items-table td {
      padding: 10px 15px;
      border-bottom: 1px solid #f0f0f0;
      vertical-align: middle;
    }
    .line-items-table input {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 8px 10px;
      width: 100%;
    }
    .line-items-table input:focus {
      outline: none;
      border-color: #667eea;
    }
    .totals-section {
      background: #f8f6ff;
      border-radius: 12px;
      padding: 20px;
      margin-top: 20px;
    }
    .totals-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 1rem;
    }
    .totals-row.grand {
      border-top: 2px solid #4a3f8a;
      margin-top: 8px;
      padding-top: 12px;
      font-size: 1.2rem;
      font-weight: 700;
      color: #4a3f8a;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <h2>🧾 Create Invoice</h2>
      <a href="/erp/reports" class="btn-back">← Back to Accounting</a>
    </div>

    <form method="POST" action="/erp/finance/invoice/create">
      <div class="card-section">
        <h5>Customer Details</h5>
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Customer Email</label>
            <input type="email" name="customer_email" class="form-control" placeholder="customer@email.com" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Customer Name</label>
            <input type="text" name="customer_name" class="form-control" placeholder="Customer name" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Invoice Date</label>
            <input type="date" name="invoice_date" class="form-control" value="{{ now_date or '' }}" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Due Date</label>
            <input type="date" name="due_date" class="form-control" required>
          </div>
          <div class="col-md-4">
            <label class="form-label">Payment Terms</label>
            <select name="payment_terms" class="form-select">
              <option value="Due on Receipt">Due on Receipt</option>
              <option value="Net 7">Net 7</option>
              <option value="Net 15">Net 15</option>
              <option value="Net 30" selected>Net 30</option>
            </select>
          </div>
        </div>
      </div>

      <div class="card-section">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
          <h5 style="margin:0;">Line Items</h5>
          <button type="button" class="btn-add-item" onclick="addRow()">+ Add Item</button>
        </div>
        <div class="table-responsive">
          <table class="line-items-table" id="lineItemsTable">
            <thead>
              <tr>
                <th style="width:40%;">Description</th>
                <th style="width:15%;">Qty</th>
                <th style="width:20%;">Unit Price</th>
                <th style="width:15%;">Total</th>
                <th style="width:10%;"></th>
              </tr>
            </thead>
            <tbody id="lineItemsBody">
              <tr>
                <td><input type="text" name="item_description[]" placeholder="Item description" required></td>
                <td><input type="number" name="item_quantity[]" min="1" value="1" oninput="calcTotals()"></td>
                <td><input type="number" name="item_price[]" step="0.01" min="0" value="0" oninput="calcTotals()"></td>
                <td class="row-total" style="font-weight:600;">0.00</td>
                <td><button type="button" class="btn-remove" onclick="removeRow(this)">Remove</button></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="totals-section">
          <div class="row g-3 mb-3">
            <div class="col-md-4">
              <label class="form-label">GST Rate (%)</label>
              <input type="number" name="gst_rate" id="gstRate" class="form-control" value="{{ gst_rate }}" step="0.01" min="0" oninput="calcTotals()">
            </div>
          </div>
          <div class="totals-row">
            <span>Subtotal</span>
            <span id="subtotalDisplay">{{ vendor_currency }} 0.00</span>
          </div>
          <div class="totals-row">
            <span>GST (<span id="gstRateLabel">{{ gst_rate }}</span>%)</span>
            <span id="gstDisplay">{{ vendor_currency }} 0.00</span>
          </div>
          <div class="totals-row grand">
            <span>Grand Total</span>
            <span id="grandTotalDisplay">{{ vendor_currency }} 0.00</span>
          </div>
        </div>
      </div>

      <div class="card-section">
        <h5>Additional Notes</h5>
        <textarea name="notes" class="form-control" rows="3" placeholder="Optional notes for the invoice"></textarea>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary-custom">Create Invoice</button>
        </div>
      </div>
    </form>
  </div>

  <script>
    function addRow() {
      var tbody = document.getElementById('lineItemsBody');
      var tr = document.createElement('tr');
      tr.innerHTML = '<td><input type="text" name="item_description[]" placeholder="Item description" required></td>' +
        '<td><input type="number" name="item_quantity[]" min="1" value="1" oninput="calcTotals()"></td>' +
        '<td><input type="number" name="item_price[]" step="0.01" min="0" value="0" oninput="calcTotals()"></td>' +
        '<td class="row-total" style="font-weight:600;">0.00</td>' +
        '<td><button type="button" class="btn-remove" onclick="removeRow(this)">Remove</button></td>';
      tbody.appendChild(tr);
    }

    function removeRow(btn) {
      var tbody = document.getElementById('lineItemsBody');
      if (tbody.rows.length > 1) {
        btn.closest('tr').remove();
        calcTotals();
      }
    }

    function calcTotals() {
      var rows = document.getElementById('lineItemsBody').rows;
      var subtotal = 0;
      for (var i = 0; i < rows.length; i++) {
        var qty = parseFloat(rows[i].querySelector('[name="item_quantity[]"]').value) || 0;
        var price = parseFloat(rows[i].querySelector('[name="item_price[]"]').value) || 0;
        var rowTotal = qty * price;
        rows[i].querySelector('.row-total').textContent = rowTotal.toFixed(2);
        subtotal += rowTotal;
      }
      var gstRate = parseFloat(document.getElementById('gstRate').value) || 0;
      var gst = subtotal * gstRate / 100;
      var grand = subtotal + gst;

      document.getElementById('subtotalDisplay').textContent = '{{ vendor_currency }} ' + subtotal.toFixed(2);
      document.getElementById('gstDisplay').textContent = '{{ vendor_currency }} ' + gst.toFixed(2);
      document.getElementById('grandTotalDisplay').textContent = '{{ vendor_currency }} ' + grand.toFixed(2);
      document.getElementById('gstRateLabel').textContent = gstRate;
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
