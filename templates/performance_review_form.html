<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Performance Review - FurrButler ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Poppins', sans-serif; }
    .container { max-width: 700px; padding: 20px; margin-top: 20px; }
    .form-card { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .back-btn:hover { background: rgba(255,255,255,0.3); color: white; }
  </style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <div class="container">
    <a href="/erp/time-slots" class="back-btn"><i class="fas fa-arrow-left"></i> Back to HR</a>
    <div class="form-card">
      <h3><i class="fas fa-chart-bar text-primary"></i> Add Performance Review</h3>
      <form method="POST" class="mt-4">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Employee</label>
            <select name="employee_id" class="form-select" required>
              <option value="">Select Employee</option>
              {% for emp in employees %}
              <option value="{{ emp[0] }}">{{ emp[1] }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Month</label>
            <input type="month" class="form-control" name="performance_month" required>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Services Completed</label>
            <input type="number" class="form-control" name="services_completed" value="0" min="0">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Revenue Generated</label>
            <input type="number" class="form-control" name="revenue_generated" value="0" step="0.01" min="0">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Customer Rating (1-5)</label>
            <input type="number" class="form-control" name="customer_rating" value="3" min="1" max="5" step="0.1">
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Attendance Rate (%)</label>
            <input type="number" class="form-control" name="attendance_rate" value="90" min="0" max="100">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Bonus Earned</label>
            <input type="number" class="form-control" name="bonus_earned" value="0" step="0.01" min="0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Feedback</label>
          <textarea name="feedback" class="form-control" rows="3" placeholder="Performance feedback..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Save Review</button>
      </form>
    </div>
  </div>
</body>
</html>
