
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Handler Login - FurrWings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #f57c00 0%, #ff9800 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Poppins', sans-serif;
    }
    .login-container {
      background: white;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      max-width: 400px;
      width: 100%;
    }
    .furrwings-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #f57c00 0%, #ff9800 100%);
      border: none;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="furrwings-logo">
      <h2>📦 FurrWings</h2>
      <p class="text-muted">Handler Portal</p>
    </div>

    {% if get_flashed_messages() %}
      {% for message in get_flashed_messages() %}
        <div class="alert alert-danger">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" class="form-control" name="email" required placeholder="handler@furrwings.com">
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Login as Handler</button>
    </form>

    <div class="text-center mt-3">
      <small class="text-muted">
        <a href="/vet/login">Vet Login</a> | 
        <a href="/isolation/login">Isolation Center Login</a> | 
        <a href="/">Back to Home</a>
      </small>
    </div>
  </div>
</body>
</html>
