
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Not Found - FurrButler</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .error-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      max-width: 500px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
    }
    .error-icon {
      font-size: 4rem;
      margin-bottom: 20px;
    }
    .back-btn {
      background-color: #667eea;
      color: white;
      padding: 12px 24px;
      border-radius: 10px;
      text-decoration: none;
      margin-top: 20px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">🐾</div>
    <h2>Vendor Not Found</h2>
    <p class="text-muted">Sorry, we couldn't find the vendor "{{ vendor_name }}" you're looking for.</p>
    <a href="/groomers" class="back-btn">← Back to Vendors</a>
  </div>
</body>
</html>
