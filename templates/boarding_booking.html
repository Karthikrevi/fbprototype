<!DOCTYPE html>
<html>
<head>
  <title>Boarding Booking - {{ vendor_name }}</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #fef9f4;
      margin: 0;
      padding: 2rem;
      color: #333;
    }

    .booking-card {
      max-width: 600px;
      margin: auto;
      background: #fff;
      border-radius: 20px;
      padding: 2rem 2.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    h2 {
      color: #ff6f61;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      margin-top: 1rem;
      font-weight: 600;
      color: #555;
    }

    input[type="date"],
    textarea {
      width: 100%;
      padding: 0.8rem;
      margin-top: 0.3rem;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 1rem;
      background: #fcfcfc;
    }

    .slider-container {
      margin-top: 1rem;
    }

    .slider-row {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    input[type="range"] {
      flex: 1;
    }

    .slider-label {
      font-weight: 600;
      color: #444;
    }

    button {
      margin-top: 2rem;
      width: 100%;
      background: #ff6f61;
      color: white;
      border: none;
      padding: 0.9rem;
      border-radius: 12px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #e4584d;
    }
  </style>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
  <div class="booking-card">
    <h2>Book Boarding at {{ vendor_name }}</h2>
    <form method="post">
      <label for="checkin_date">Check-in Date:</label>
      <input type="date" name="checkin_date" required>

      <label for="duration">Duration:</label>
      <div class="slider-container">
        <div class="slider-row">
          <input type="range" id="durationSlider" name="duration" min="0" max="7" value="0">
          <span class="slider-label" id="durationLabel">1 Hour</span>
        </div>
      </div>

      <label for="notes">Additional Notes:</label>
      <textarea name="notes" rows="4" placeholder="Any special requests or instructions?"></textarea>

      <button type="submit">Confirm Booking</button>
    </form>
  </div>

  <script>
    const slider = document.getElementById("durationSlider");
    const label = document.getElementById("durationLabel");

    const options = [
      "1 Hour", "2 Hours", "6 Hours", "12 Hours",
      "1 Day", "2 Days", "3 Days", "1 Week"
    ];

    slider.addEventListener("input", () => {
      label.textContent = options[slider.value];
    });
  </script>
</body>
</html>
