<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invalid Link — FurrWings</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:#f0f4f8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.1);max-width:460px;width:100%;overflow:hidden}
.card-header{background:linear-gradient(135deg,#ef4444 0%,#f97316 100%);color:#fff;padding:30px;text-align:center}
.card-header .icon{font-size:48px;margin-bottom:8px}
.card-header h1{font-size:22px;margin-bottom:4px}
.card-body{padding:30px;text-align:center}
.card-body p{font-size:14px;color:#6b7280;line-height:1.6;margin-bottom:16px}
.btn-login{background:linear-gradient(135deg,#7c3aed,#a855f7);color:#fff;border:none;padding:10px 24px;border-radius:8px;font-size:14px;text-decoration:none;display:inline-block}
.contact{font-size:12px;color:#9ca3af;margin-top:16px}
.contact a{color:#7c3aed}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<div class="card">
<div class="card-header">
<div class="icon">⚠️</div>
<h1>{{ error_title }}</h1>
</div>
<div class="card-body">
<p>{{ error_message }}</p>
{% if login_url %}
<a href="{{ login_url }}" class="btn-login">Go to Login Page</a>
{% endif %}
<div class="contact">Contact <a href="mailto:{{ contact }}">{{ contact }}</a> if you need help.</div>
</div>
</div>
</body>
</html>
