
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export My Data - FurrButler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header">
                        <h4>📄 Export My Data (GDPR)</h4>
                    </div>
                    <div class="card-body">
                        <p>You can download all your personal data that FurrButler has stored. This includes:</p>
                        <ul>
                            <li>Your pet profiles</li>
                            <li>Booking history</li>
                            <li>Order history</li>
                            <li>Account information</li>
                        </ul>
                        
                        <form method="POST">
                            <button type="submit" class="btn btn-primary">Download My Data</button>
                            <a href="/settings" class="btn btn-secondary">Cancel</a>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
