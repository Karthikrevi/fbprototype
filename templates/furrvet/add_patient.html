<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Patient - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.section-title{color:#1a3a5c;font-weight:700;border-bottom:2px solid #00897b;padding-bottom:0.5rem;margin-bottom:1rem}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2><i class="fas fa-paw"></i> New Patient Registration</h2>
<a href="{{ url_for('furrvet.patients') }}" class="btn btn-outline-light btn-sm">Back to Patients</a>
</div>
</div>
<div class="container py-4">
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-info">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="section-card">
<h4 class="section-title">Pet Owner Details</h4>
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Owner Name *</label><input type="text" name="owner_name" class="form-control" required></div>
<div class="col-md-6"><label class="form-label">Phone *</label><input type="text" name="owner_phone" class="form-control" required></div>
<div class="col-md-6"><label class="form-label">Email</label><input type="email" name="owner_email" class="form-control"></div>
<div class="col-md-6"><label class="form-label">City</label><input type="text" name="owner_city" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Address</label><textarea name="owner_address" class="form-control" rows="2"></textarea></div>
<div class="col-md-6"><label class="form-label">Emergency Contact</label><input type="text" name="emergency_contact" class="form-control"></div>
</div>
</div>
<div class="section-card">
<h4 class="section-title">Pet Details</h4>
<div class="row g-3">
<div class="col-md-4"><label class="form-label">Pet Name *</label><input type="text" name="pet_name" class="form-control" required></div>
<div class="col-md-4"><label class="form-label">Species *</label>
<select name="species" class="form-select" required>
<option value="">Select</option>
<option>Dog</option><option>Cat</option><option>Bird</option><option>Rabbit</option>
<option>Fish</option><option>Hamster</option><option>Reptile</option><option>Other</option>
</select></div>
<div class="col-md-4"><label class="form-label">Breed</label><input type="text" name="breed" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Gender</label>
<select name="gender" class="form-select">
<option value="">Select</option>
<option>Male</option><option>Female</option><option>Unknown</option><option>Neutered Male</option><option>Spayed Female</option>
</select></div>
<div class="col-md-4"><label class="form-label">Date of Birth</label><input type="date" name="date_of_birth" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Weight (kg)</label><input type="number" name="weight" class="form-control" step="0.1"></div>
<div class="col-md-4"><label class="form-label">Color</label><input type="text" name="color" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Microchip ID</label><input type="text" name="microchip_id" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Insurance Info</label><input type="text" name="insurance_info" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Distinguishing Marks</label><textarea name="distinguishing_marks" class="form-control" rows="2"></textarea></div>
<div class="col-md-6"><label class="form-label">Allergies</label><textarea name="allergies" class="form-control" rows="2"></textarea></div>
<div class="col-12"><label class="form-label">Medical Conditions</label><textarea name="medical_conditions" class="form-control" rows="2"></textarea></div>
</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Register Patient</button></div>
</form>
</div>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</body>
</html>
