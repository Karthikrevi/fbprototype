<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accounts Payable - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.table th{background:#f1f5f9;color:#1a3a5c}
</style>
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Accounts Payable</h2>
<a href="{{ url_for('furrvet.financials') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
<div class="section-card">
<table class="table table-hover mb-0">
<thead><tr><th>PO Number</th><th>Supplier</th><th>Order Date</th><th>Expected Delivery</th><th>Amount</th><th>Status</th></tr></thead>
<tbody>
{% for p in payables %}
<tr><td>{{ p[1] }}</td><td>{{ p[-1] }}</td><td>{{ p[3] }}</td><td>{{ p[4] or 'N/A' }}</td><td>{{ "%.2f"|format(p[5]) }}</td>
<td><span class="badge bg-{{ 'warning' if p[6]=='pending' else 'success' }}">{{ p[6] }}</span></td></tr>
{% endfor %}
{% if not payables %}<tr><td colspan="6" class="text-center text-muted">No pending payables</td></tr>{% endif %}
</tbody>
</table>
</div>
</div>
</body>
</html>
