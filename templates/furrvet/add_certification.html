<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Certification - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Add Certification</h2>
<a href="{{ url_for('furrvet.staff_management') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
<form method="POST" enctype="multipart/form-data">
<div class="section-card">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Certification Name *</label><input type="text" name="certification_name" class="form-control" required></div>
<div class="col-md-6"><label class="form-label">Issuing Body</label><input type="text" name="issuing_body" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Issue Date</label><input type="date" name="issue_date" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Expiry Date</label><input type="date" name="expiry_date" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Document</label><input type="file" name="document" class="form-control" accept=".pdf,.jpg,.jpeg,.png"></div>
</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Add Certification</button></div>
</form>
</div>
</body>
</html>
