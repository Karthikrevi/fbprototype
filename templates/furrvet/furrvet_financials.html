<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clinic Financials - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.stat-card{background:white;border-radius:1rem;padding:1.5rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.stat-value{font-size:1.8rem;font-weight:800;color:#1a3a5c}
.stat-label{color:#6b7280;font-size:0.9rem}
.quick-link{background:white;border-radius:0.75rem;padding:1rem;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05);text-decoration:none;color:#1a3a5c;display:block;transition:transform 0.2s}
.quick-link:hover{transform:translateY(-3px);color:#00897b}
.quick-link i{font-size:1.5rem;color:#00897b;margin-bottom:0.5rem;display:block}
</style>
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2><i class="fas fa-chart-line"></i> Clinic Financials</h2>
<a href="{{ url_for('furrvet.dashboard') }}" class="btn btn-outline-light btn-sm">Dashboard</a>
</div>
</div>
<div class="container py-4">
<div class="row g-3 mb-4">
<div class="col-md-3"><div class="stat-card"><div class="stat-value">{{ "%.0f"|format(today_revenue) }}</div><div class="stat-label">Today's Revenue</div></div></div>
<div class="col-md-3"><div class="stat-card"><div class="stat-value">{{ "%.0f"|format(month_revenue) }}</div><div class="stat-label">This Month Revenue</div></div></div>
<div class="col-md-3"><div class="stat-card"><div class="stat-value" style="color:#dc3545">{{ "%.0f"|format(outstanding) }}</div><div class="stat-label">Outstanding (AR)</div></div></div>
<div class="col-md-3"><div class="stat-card"><div class="stat-value" style="color:#ffc107">{{ "%.0f"|format(pending_ap) }}</div><div class="stat-label">Pending Payments (AP)</div></div></div>
</div>
<div class="row g-3">
<div class="col-md-3"><a href="{{ url_for('furrvet.pnl_report') }}" class="quick-link"><i class="fas fa-file-invoice-dollar"></i>P&L Report</a></div>
<div class="col-md-3"><a href="{{ url_for('furrvet.accounts_receivable') }}" class="quick-link"><i class="fas fa-hand-holding-usd"></i>Accounts Receivable</a></div>
<div class="col-md-3"><a href="{{ url_for('furrvet.accounts_payable') }}" class="quick-link"><i class="fas fa-file-invoice"></i>Accounts Payable</a></div>
<div class="col-md-3"><a href="{{ url_for('furrvet.gst_report') }}" class="quick-link"><i class="fas fa-percentage"></i>GST Report</a></div>
</div>
</div>
</body>
</html>
