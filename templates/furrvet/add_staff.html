<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Staff - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Add Staff Member</h2>
<a href="{{ url_for('furrvet.staff_management') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-info">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="section-card">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Name *</label><input type="text" name="name" class="form-control" required></div>
<div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control"></div>
<div class="col-md-6"><label class="form-label">Role *</label>
<select name="role" class="form-select">
<option>Veterinarian</option><option>Vet Nurse</option><option>Vet Technician</option><option>Receptionist</option>
<option>Pharmacist</option><option>Lab Technician</option><option>Cleaner</option><option>Driver</option><option>Other</option>
</select></div>
<div class="col-md-4"><label class="form-label">Department</label>
<select name="department" class="form-select"><option>Clinical</option><option>Pharmacy</option><option>Laboratory</option><option>Reception</option><option>Administration</option></select></div>
<div class="col-md-4"><label class="form-label">Salary</label><input type="number" name="salary" class="form-control" step="0.01"></div>
<div class="col-md-4"><label class="form-label">Hire Date</label><input type="date" name="hire_date" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Shift Timing</label><input type="text" name="shift_timing" class="form-control" placeholder="e.g. 9AM-5PM"></div>
<div class="col-md-4"><label class="form-label">Emergency Contact</label><input type="text" name="emergency_contact" class="form-control"></div>
<div class="col-12"><label class="form-label">Qualifications</label><textarea name="qualifications" class="form-control" rows="2"></textarea></div>
</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Add Staff Member</button></div>
</form>
</div>
</body>
</html>
