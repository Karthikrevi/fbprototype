<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Appointment - FurrVet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary-blue: #3b82f6; --clinic-teal: #0891b2; --soft-grey: #f8fafc; --text-dark: #1e293b; --border-light: #e2e8f0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--soft-grey); color: var(--text-dark); }
        .sidebar { width: 280px; height: 100vh; position: fixed; left: 0; top: 0; background: linear-gradient(135deg, var(--primary-blue) 0%, var(--clinic-teal) 100%); box-shadow: 2px 0 10px rgba(0,0,0,0.1); z-index: 1000; overflow-y: auto; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .sidebar-brand { font-size: 1.5rem; font-weight: 700; color: white; text-decoration: none; }
        .nav-link { color: rgba(255,255,255,0.9); padding: 0.75rem 1.5rem; display: flex; align-items: center; text-decoration: none; transition: all 0.3s ease; }
        .nav-link:hover, .nav-link.active { background-color: rgba(255,255,255,0.15); color: white; transform: translateX(3px); }
        .nav-link i { width: 20px; margin-right: 0.75rem; }
        .main-content { margin-left: 280px; padding: 2rem; }
        .page-header { background: white; padding: 1.5rem 2rem; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); margin-bottom: 2rem; border-left: 4px solid var(--primary-blue); }
        .form-card { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.05); max-width: 700px; }
        .form-label { font-weight: 500; color: var(--text-dark); }
        @media (max-width: 768px) { .sidebar { transform: translateX(-100%); } .main-content { margin-left: 0; padding: 1rem; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <a href="/furrvet" class="sidebar-brand"><i class="fas fa-heartbeat"></i> FurrVet</a>
        </div>
        <nav>
            <div class="nav-item"><a href="/furrvet/dashboard" class="nav-link"><i class="fas fa-tachometer-alt"></i>Dashboard</a></div>
            <div class="nav-item"><a href="/furrvet/appointments" class="nav-link active"><i class="fas fa-calendar-check"></i>Appointments</a></div>
            <div class="nav-item"><a href="/furrvet/patients" class="nav-link"><i class="fas fa-paw"></i>Patients</a></div>
            <div class="nav-item"><a href="/furrvet/medical-records" class="nav-link"><i class="fas fa-notes-medical"></i>Medical Records</a></div>
            <div class="nav-item"><a href="/furrvet/laboratory" class="nav-link"><i class="fas fa-microscope"></i>Laboratory</a></div>
            <div class="nav-item"><a href="/furrvet/billing" class="nav-link"><i class="fas fa-file-invoice-dollar"></i>Billing</a></div>
            <div class="nav-item"><a href="/furrvet/inventory" class="nav-link"><i class="fas fa-boxes"></i>Inventory</a></div>
            <div class="nav-item"><a href="/furrvet/hospitalization" class="nav-link"><i class="fas fa-bed"></i>Hospitalization</a></div>
            <div class="nav-item"><a href="/furrvet/reports" class="nav-link"><i class="fas fa-chart-line"></i>Reports</a></div>
            <div class="nav-item"><a href="/furrvet/logout" class="nav-link"><i class="fas fa-sign-out-alt"></i>Logout</a></div>
        </nav>
    </div>

    <div class="main-content">
        <div class="mb-3">
            <a href="/furrvet/appointments" class="text-decoration-none"><i class="fas fa-arrow-left"></i> Back to Appointments</a>
        </div>

        <div class="page-header">
            <h1 class="mb-1"><i class="fas fa-calendar-plus"></i> Schedule New Appointment</h1>
            <p class="text-muted mb-0">Book a new appointment for a patient</p>
        </div>

        <div class="form-card">
            <form method="POST" action="/furrvet/appointments/new">
                <div class="mb-3">
                    <label for="pet_id" class="form-label">Patient <span class="text-danger">*</span></label>
                    <select name="pet_id" id="pet_id" class="form-select" required>
                        <option value="">Select a patient...</option>
                        {% for pet in pets %}
                        <option value="{{ pet[0] }}" {% if request.args.get('patient_id') == pet[0]|string %}selected{% endif %}>
                            {{ pet[1] }} (Owner: {{ pet[2] }})
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="appointment_date" class="form-label">Date <span class="text-danger">*</span></label>
                        <input type="date" name="appointment_date" id="appointment_date" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="appointment_time" class="form-label">Time <span class="text-danger">*</span></label>
                        <input type="time" name="appointment_time" id="appointment_time" class="form-control" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="appointment_type" class="form-label">Appointment Type <span class="text-danger">*</span></label>
                    <select name="appointment_type" id="appointment_type" class="form-select" required>
                        <option value="">Select type...</option>
                        <option value="General Checkup">General Checkup</option>
                        <option value="Vaccination">Vaccination</option>
                        <option value="Surgery">Surgery</option>
                        <option value="Dental">Dental</option>
                        <option value="Dermatology">Dermatology</option>
                        <option value="Emergency">Emergency</option>
                        <option value="Follow-up">Follow-up</option>
                        <option value="Grooming">Grooming</option>
                        <option value="Lab Work">Lab Work</option>
                        <option value="X-Ray/Imaging">X-Ray/Imaging</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label for="reason" class="form-label">Reason / Notes</label>
                    <textarea name="reason" id="reason" class="form-control" rows="3" placeholder="Describe the reason for the appointment..."></textarea>
                </div>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Schedule Appointment</button>
                    <a href="/furrvet/appointments" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
