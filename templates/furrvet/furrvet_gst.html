<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Report - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.gst-item{display:flex;justify-content:space-between;padding:1rem 0;border-bottom:1px solid #e5e7eb}
.gst-item:last-child{border-bottom:none;font-weight:700;font-size:1.1rem}
@media print{.no-print{display:none!important}}
</style>
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>GST Report (Current Month)</h2>
<div class="no-print">
<button onclick="window.print()" class="btn btn-outline-light btn-sm me-2">Print</button>
<a href="{{ url_for('furrvet.financials') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
</div>
<div class="container py-4">
<div class="section-card" style="max-width:500px;margin:0 auto">
<div class="gst-item"><span>GST Collected (Output Tax)</span><span>{{ "%.2f"|format(gst_collected) }}</span></div>
<div class="gst-item"><span>GST Paid (Input Tax)</span><span>{{ "%.2f"|format(gst_paid) }}</span></div>
<div class="gst-item"><span>Net GST Payable</span><span style="color:{{ '#dc3545' if net_gst > 0 else '#28a745' }}">{{ "%.2f"|format(net_gst) }}</span></div>
</div>
</div>
</body>
</html>
