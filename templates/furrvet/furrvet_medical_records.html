
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical Records - FurrVet ERP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .main-content {
            margin-left: 300px;
            padding: 2rem;
        }
        .record-card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1><i class="fas fa-notes-medical"></i> Medical Records</h1>
            <a href="/furrvet/medical-records/new" class="btn btn-primary">
                <i class="fas fa-plus"></i> New Record
            </a>
        </div>

        {% for record in records %}
        <div class="record-card">
            <div class="row">
                <div class="col-md-8">
                    <h5>{{ record[8] }} - {{ record[9] }}</h5>
                    <p><strong>Date:</strong> {{ record[3] }}</p>
                    <p><strong>Complaint:</strong> {{ record[4] or 'Not specified' }}</p>
                    <p><strong>Diagnosis:</strong> {{ record[6] or 'Pending' }}</p>
                </div>
                <div class="col-md-4 text-end">
                    <a href="/furrvet/medical-records/{{ record[0] }}" class="btn btn-outline-primary">
                        <i class="fas fa-eye"></i> View Details
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</body>
</html>
