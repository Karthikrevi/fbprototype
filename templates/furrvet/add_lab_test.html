<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Lab Test - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
</style>
<link rel="stylesheet" href="/static/css/mobile.css">
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Order Lab Test</h2>
<a href="{{ url_for('furrvet.laboratory') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-info">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="section-card">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Patient *</label>
<select name="pet_id" class="form-select" required>
<option value="">Select Patient</option>
{% for p in pets %}<option value="{{ p[0] }}">{{ p[1] }} ({{ p[2] }})</option>{% endfor %}
</select></div>
<div class="col-md-6"><label class="form-label">Test Name *</label>
<select name="test_name" class="form-select" onchange="document.getElementById('otherTest').style.display=this.value=='Other'?'block':'none'">
<option value="">Select Test</option>
<option>Complete Blood Count (CBC)</option><option>Blood Chemistry Panel</option>
<option>Urinalysis</option><option>Fecal Examination</option><option>Thyroid Panel (T4)</option>
<option>Heartworm Test</option><option>Tick Panel</option><option>Parvovirus Test</option>
<option>FeLV/FIV Test</option><option>Culture and Sensitivity</option>
<option>Cytology</option><option>Biopsy</option><option value="Other">Other</option>
</select>
<div id="otherTest" style="display:none;margin-top:0.5rem"><input type="text" name="test_name_other" class="form-control" placeholder="Enter test name"></div></div>
<div class="col-md-4"><label class="form-label">Test Type</label>
<select name="test_type" class="form-select"><option>In-House</option><option>External Lab</option><option>Rapid Test</option><option>Culture</option></select></div>
<div class="col-md-4"><label class="form-label">Ordered Date</label><input type="date" name="ordered_date" class="form-control" value="{{ today }}"></div>
<div class="col-md-4"><label class="form-label">External Lab</label><input type="text" name="external_lab" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Cost</label><input type="number" name="cost" class="form-control" step="0.01"></div>
<div class="col-md-8"><label class="form-label">Notes</label><textarea name="notes" class="form-control" rows="2"></textarea></div>
</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Order Lab Test</button></div>
</form>
</div>
<script>var today=new Date().toISOString().split('T')[0];if(!document.querySelector('[name=ordered_date]').value)document.querySelector('[name=ordered_date]').value=today;</script>
</body>
</html>
