<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Staff - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
</style>
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Edit: {{ member[1] }}</h2>
<a href="{{ url_for('furrvet.staff_detail', staff_id=member[0]) }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
<form method="POST">
<div class="section-card">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Name *</label><input type="text" name="name" class="form-control" value="{{ member[1] }}" required></div>
<div class="col-md-6"><label class="form-label">Email</label><input type="email" name="email" class="form-control" value="{{ member[2] or '' }}"></div>
<div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" value="{{ member[3] or '' }}"></div>
<div class="col-md-6"><label class="form-label">Role</label>
<select name="role" class="form-select">
{% for r in ['Veterinarian','Vet Nurse','Vet Technician','Receptionist','Pharmacist','Lab Technician','Cleaner','Driver','Other'] %}
<option {% if member[4]==r %}selected{% endif %}>{{ r }}</option>
{% endfor %}
</select></div>
<div class="col-md-4"><label class="form-label">Department</label>
<select name="department" class="form-select">
{% for d in ['Clinical','Pharmacy','Laboratory','Reception','Administration'] %}
<option {% if member[5]==d %}selected{% endif %}>{{ d }}</option>
{% endfor %}
</select></div>
<div class="col-md-4"><label class="form-label">Salary</label><input type="number" name="salary" class="form-control" step="0.01" value="{{ member[6] or '' }}"></div>
<div class="col-md-4"><label class="form-label">Shift Timing</label><input type="text" name="shift_timing" class="form-control" value="{{ member[8] or '' }}"></div>
<div class="col-md-6"><label class="form-label">Emergency Contact</label><input type="text" name="emergency_contact" class="form-control" value="{{ member[10] or '' }}"></div>
<div class="col-12"><label class="form-label">Qualifications</label><textarea name="qualifications" class="form-control" rows="2">{{ member[9] or '' }}</textarea></div>
</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Update Staff Member</button></div>
</form>
</div>
</body>
</html>
