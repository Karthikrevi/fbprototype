<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Prescription - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.section-title{color:#1a3a5c;font-weight:700;border-bottom:2px solid #00897b;padding-bottom:0.5rem;margin-bottom:1rem}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
.drug-row{background:#f1f5f9;border-radius:0.5rem;padding:1rem;margin-bottom:0.5rem}
</style>
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Quick Prescription</h2>
<a href="{{ url_for('furrvet.patients') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-info">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="section-card">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Patient *</label>
<select name="pet_id" class="form-select" required>
<option value="">Select</option>
{% for p in pets %}<option value="{{ p[0] }}">{{ p[1] }} ({{ p[2] }}) - {{ p[3] }}</option>{% endfor %}
</select></div>
<div class="col-md-3"><label class="form-label">Date</label><input type="date" name="rx_date" class="form-control"></div>
</div>
</div>
<div class="section-card">
<h5 class="section-title">Medications</h5>
<div id="drugRows">
<div class="drug-row">
<div class="row g-2">
<div class="col-md-3"><input type="text" name="drug_name[]" class="form-control" placeholder="Drug name" list="medList"></div>
<div class="col-md-1"><input type="text" name="strength[]" class="form-control" placeholder="Str."></div>
<div class="col-md-2"><select name="drug_form[]" class="form-select">
<option>Tablet</option><option>Capsule</option><option>Liquid</option><option>Injection</option>
<option>Topical</option><option>Eye Drops</option><option>Ear Drops</option><option>Cream</option><option>Powder</option>
</select></div>
<div class="col-md-1"><input type="text" name="dose[]" class="form-control" placeholder="Dose"></div>
<div class="col-md-2"><select name="frequency[]" class="form-select">
<option>Once Daily</option><option>Twice Daily</option><option>Three Times Daily</option>
<option>Every 8 Hours</option><option>Every 12 Hours</option><option>Weekly</option><option>As Needed</option>
</select></div>
<div class="col-md-1"><input type="text" name="duration[]" class="form-control" placeholder="Days"></div>
<div class="col-md-1"><input type="text" name="drug_instructions[]" class="form-control" placeholder="Notes"></div>
<div class="col-md-1"><button type="button" class="btn btn-sm btn-outline-danger" onclick="removeRow(this)">X</button></div>
</div>
</div>
</div>
<datalist id="medList">{% for m in medications %}<option value="{{ m }}">{% endfor %}</datalist>
<button type="button" class="btn btn-sm btn-outline-primary mt-2" onclick="addDrug()">+ Add Drug</button>
</div>
<div class="section-card">
<div class="row g-3">
<div class="col-12"><label class="form-label">General Instructions</label><textarea name="general_instructions" class="form-control" rows="2"></textarea></div>
<div class="col-md-4"><div class="form-check"><input type="checkbox" name="refill_allowed" class="form-check-input"><label class="form-check-label">Refill Allowed</label></div></div>
</div>
<div class="mt-2 text-muted">Prescribing Vet: {{ vet_name }}</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Create Prescription</button></div>
</form>
</div>
<script>
var today=new Date().toISOString().split('T')[0];document.querySelector('[name=rx_date]').value=today;
function addDrug(){var r=document.querySelector('.drug-row').cloneNode(true);r.querySelectorAll('input').forEach(function(i){i.value='';});document.getElementById('drugRows').appendChild(r);}
function removeRow(b){if(document.querySelectorAll('.drug-row').length>1)b.closest('.drug-row').remove();}
</script>
</body>
</html>
