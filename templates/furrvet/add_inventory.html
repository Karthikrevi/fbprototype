<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Inventory - FurrVet</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Segoe UI',sans-serif}
.clinical-header{background:#1a3a5c;color:white;padding:1.5rem;border-radius:0 0 1rem 1rem}
.section-card{background:white;border-radius:1rem;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.btn-clinical{background:#00897b;color:white;border:none;border-radius:0.5rem;padding:0.75rem 2rem}
.btn-clinical:hover{background:#00796b;color:white}
</style>
</head>
<body>
<div class="clinical-header">
<div class="container d-flex justify-content-between align-items-center">
<h2>Add Inventory Item</h2>
<a href="{{ url_for('furrvet.furrvet_inventory') }}" class="btn btn-outline-light btn-sm">Back</a>
</div>
</div>
<div class="container py-4">
{% with messages = get_flashed_messages() %}{% if messages %}<div class="alert alert-info">{% for m in messages %}<div>{{ m }}</div>{% endfor %}</div>{% endif %}{% endwith %}
<form method="POST">
<div class="section-card">
<div class="row g-3">
<div class="col-md-6"><label class="form-label">Item Name *</label><input type="text" name="item_name" class="form-control" required></div>
<div class="col-md-6"><label class="form-label">Item Type *</label>
<select name="item_type" class="form-select">
<option>Medication</option><option>Vaccine</option><option>Consumable</option><option>Equipment</option>
<option>Surgical Supply</option><option>Diagnostic</option><option>Food</option><option>Other</option>
</select></div>
<div class="col-md-4"><label class="form-label">Category</label><input type="text" name="category" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Brand</label><input type="text" name="brand" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Unit of Measure</label>
<select name="unit_of_measure" class="form-select">
<option>Tablet</option><option>Capsule</option><option>Vial</option><option>Bottle</option>
<option>Box</option><option>Pack</option><option>Piece</option><option>ml</option><option>mg</option><option>kg</option>
</select></div>
<div class="col-md-3"><label class="form-label">Current Stock *</label><input type="number" name="current_stock" class="form-control" required value="0"></div>
<div class="col-md-3"><label class="form-label">Minimum Stock</label><input type="number" name="minimum_stock" class="form-control" value="10"></div>
<div class="col-md-3"><label class="form-label">Unit Cost</label><input type="number" name="unit_cost" class="form-control" step="0.01"></div>
<div class="col-md-3"><label class="form-label">Selling Price</label><input type="number" name="selling_price" class="form-control" step="0.01"></div>
<div class="col-md-4"><label class="form-label">Supplier</label><input type="text" name="supplier" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Batch Number</label><input type="text" name="batch_number" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Expiry Date</label><input type="date" name="expiry_date" class="form-control"></div>
<div class="col-md-4"><label class="form-label">Storage Location</label><input type="text" name="location" class="form-control"></div>
</div>
</div>
<div class="text-center"><button type="submit" class="btn-clinical">Add Item</button></div>
</form>
</div>
</body>
</html>
