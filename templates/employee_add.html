<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Employee - FurrButler ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Poppins', sans-serif; }
    .container { max-width: 800px; padding: 20px; margin-top: 20px; }
    .card-section { background: rgba(255,255,255,0.95); border-radius: 15px; padding: 25px; margin-bottom: 20px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .back-btn { background: rgba(255,255,255,0.2); color: white; padding: 10px 20px; border-radius: 25px; text-decoration: none; display: inline-block; margin-bottom: 20px; }
    .back-btn:hover { background: rgba(255,255,255,0.3); color: white; }
    .btn-save { background: linear-gradient(135deg, #667eea, #764ba2); color: white; border: none; padding: 10px 30px; border-radius: 25px; font-weight: 600; }
    .btn-save:hover { opacity: 0.9; color: white; }
    .btn-cancel { background: #6c757d; color: white; border: none; padding: 10px 30px; border-radius: 25px; font-weight: 600; }
    .btn-cancel:hover { opacity: 0.85; color: white; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/erp/hr/employees" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Employees</a>

    {% with messages = get_flashed_messages() %}
    {% if messages %}
    {% for msg in messages %}
    <div class="alert alert-danger alert-dismissible fade show"><i class="fas fa-exclamation-circle"></i> {{ msg }}<button type="button" class="btn-close" data-bs-dismiss="alert"></button></div>
    {% endfor %}
    {% endif %}
    {% endwith %}

    <div class="card-section">
      <h4 class="mb-4"><i class="fas fa-user-plus text-primary"></i> Add New Employee</h4>
      <form method="POST" action="/erp/hr/employees/add">
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">First Name <span class="text-danger">*</span></label>
            <input type="text" name="first_name" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Last Name <span class="text-danger">*</span></label>
            <input type="text" name="last_name" class="form-control" required>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Email <span class="text-danger">*</span></label>
            <input type="email" name="email" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Phone</label>
            <input type="text" name="phone" class="form-control">
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Position <span class="text-danger">*</span></label>
            <input type="text" name="position" class="form-control" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Join Date <span class="text-danger">*</span></label>
            <input type="date" name="join_date" class="form-control" required>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Base Salary <span class="text-danger">*</span></label>
            <input type="number" name="base_salary" class="form-control" step="0.01" required>
          </div>
          <div class="col-md-6 mb-3">
            <label class="form-label">Hourly Rate</label>
            <input type="number" name="hourly_rate" class="form-control" step="0.01" value="0">
          </div>
        </div>
        <div class="mb-3">
          <label class="form-label">Emergency Contact</label>
          <input type="text" name="emergency_contact" class="form-control">
        </div>
        <div class="mb-3">
          <label class="form-label">Skills</label>
          <input type="text" name="skills" class="form-control" placeholder="e.g. Dog grooming, Cat handling">
        </div>
        <div class="mb-3">
          <label class="form-label">Certifications</label>
          <input type="text" name="certifications" class="form-control" placeholder="e.g. Pet First Aid, CPDT-KA">
        </div>
        <div class="d-flex gap-3 mt-4">
          <button type="submit" class="btn btn-save"><i class="fas fa-save"></i> Save Employee</button>
          <a href="/erp/hr/employees" class="btn btn-cancel"><i class="fas fa-times"></i> Cancel</a>
        </div>
      </form>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
