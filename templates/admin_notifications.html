<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notifications — FurrButler Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8f9fa;font-family:'Poppins',sans-serif}
.admin-header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:20px 0;margin-bottom:30px}
.notif-card{background:#fff;border-radius:10px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.06);margin-bottom:12px;border-left:4px solid #667eea;display:flex;justify-content:space-between;align-items:flex-start;gap:16px}
.notif-card.unread{border-left-color:#dc3545;background:#fff8f8}
.notif-card .title{font-weight:600;font-size:14px;color:#212529;margin-bottom:4px}
.notif-card .message{font-size:13px;color:#666;margin-bottom:4px}
.notif-card .time{font-size:11px;color:#999}
.notif-card .badge-cat{font-size:11px}
.empty-state{text-align:center;padding:60px 20px;background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.empty-state .emoji{font-size:48px;margin-bottom:12px}
</style>
</head>
<body>
<div class="admin-header">
<div class="container">
<div class="d-flex justify-content-between align-items-center">
<h1>🔔 Admin Notifications</h1>
<div>
<a href="/master/admin/dashboard" class="btn btn-outline-light">← Back to Dashboard</a>
<a href="/master/admin/logout" class="btn btn-outline-danger">Logout</a>
</div>
</div>
</div>
</div>
<div class="container">
{% if notifications|length > 0 %}
{% for n in notifications %}
<div class="notif-card {% if n[5] == 0 %}unread{% endif %}">
<div style="flex:1">
<div class="title">{{ n[1] }}</div>
<div class="message">{{ n[2] }}</div>
<div class="time">{{ n[6] }}</div>
</div>
<div class="d-flex align-items-center gap-2">
<span class="badge bg-{% if n[4] == 'warning' %}warning{% elif n[4] == 'danger' %}danger{% elif n[4] == 'success' %}success{% else %}info{% endif %} badge-cat">{{ n[4] }}</span>
{% if n[3] %}<a href="{{ n[3] }}" class="btn btn-sm btn-outline-primary">View</a>{% endif %}
</div>
</div>
{% endfor %}
{% else %}
<div class="empty-state">
<div class="emoji">🔔</div>
<h5>No notifications yet</h5>
<p class="text-muted">System notifications will appear here</p>
</div>
{% endif %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
