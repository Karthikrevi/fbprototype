
# FurrButler Data Processing Purposes
# Defines lawful purposes for processing personal data under GDPR

version: "1.0"
last_updated: "2024-01-01"

# Core business purposes
purposes:
  # Essential service delivery
  essential_services:
    name: "Essential Service Delivery"
    description: "Core platform functionality and service delivery"
    legal_basis: "contract"
    retention_period: 2555  # 7 years
    data_categories:
      - user_profile
      - pet_data
      - booking_information
      - payment_data
    automated_decision_making: false
    third_party_sharing: false
    
  # Pet health and medical records
  pet_healthcare:
    name: "Pet Healthcare Management"
    description: "Managing pet health records, vaccinations, and medical history"
    legal_basis: "contract"
    retention_period: 3650  # 10 years (veterinary requirement)
    data_categories:
      - pet_medical_records
      - vaccination_history
      - health_certificates
      - veterinary_data
    automated_decision_making: false
    third_party_sharing: true
    third_parties:
      - veterinarians
      - government_authorities
      - international_pet_travel_agencies
      
  # International pet travel (FurrWings)
  international_travel:
    name: "International Pet Travel Services"
    description: "Facilitating international pet travel and passport services"
    legal_basis: "contract"
    retention_period: 2555  # 7 years
    data_categories:
      - travel_documents
      - passport_requests
      - customs_declarations
      - quarantine_records
    automated_decision_making: true
    automated_decisions:
      - document_verification
      - travel_eligibility_assessment
    third_party_sharing: true
    third_parties:
      - customs_authorities
      - quarantine_facilities
      - international_handlers
      - government_agencies
      
  # Marketing and communications
  marketing:
    name: "Marketing and Communications"
    description: "Sending marketing materials and service updates"
    legal_basis: "consent"
    consent_required: true
    retention_period: 1095  # 3 years or until consent withdrawn
    data_categories:
      - contact_information
      - communication_preferences
      - usage_patterns
      - demographic_data
    automated_decision_making: true
    automated_decisions:
      - personalized_recommendations
      - targeted_advertising
    opt_out_available: true
    
  # Analytics and service improvement
  analytics:
    name: "Analytics and Service Improvement"
    description: "Analyzing usage patterns to improve our services"
    legal_basis: "legitimate_interest"
    legitimate_interest_assessment: true
    retention_period: 730  # 2 years
    data_categories:
      - usage_analytics
      - performance_metrics
      - error_logs
      - feature_usage
    automated_decision_making: true
    automated_decisions:
      - service_optimization
      - feature_recommendations
    data_minimization: true
    pseudonymization: true
    
  # Customer support
  customer_support:
    name: "Customer Support Services"
    description: "Providing customer support and resolving issues"
    legal_basis: "contract"
    retention_period: 1095  # 3 years
    data_categories:
      - support_tickets
      - communication_history
      - issue_resolution_data
    automated_decision_making: false
    third_party_sharing: false
    
  # Legal compliance
  legal_compliance:
    name: "Legal and Regulatory Compliance"
    description: "Meeting legal and regulatory obligations"
    legal_basis: "legal_obligation"
    retention_period: 2555  # 7 years (legal requirement)
    data_categories:
      - audit_logs
      - compliance_reports
      - legal_documentation
      - regulatory_filings
    automated_decision_making: false
    third_party_sharing: true
    third_parties:
      - regulatory_authorities
      - law_enforcement
      - legal_representatives
      
  # Security and fraud prevention
  security:
    name: "Security and Fraud Prevention"
    description: "Protecting against fraud, abuse, and security threats"
    legal_basis: "legitimate_interest"
    legitimate_interest_assessment: true
    retention_period: 2555  # 7 years
    data_categories:
      - security_logs
      - access_logs
      - suspicious_activity_data
      - device_information
    automated_decision_making: true
    automated_decisions:
      - fraud_detection
      - risk_assessment
      - access_control
      
  # Financial management
  financial:
    name: "Financial Management and Accounting"
    description: "Processing payments and maintaining financial records"
    legal_basis: "contract"
    retention_period: 2555  # 7 years (tax requirement)
    data_categories:
      - payment_information
      - billing_data
      - tax_records
      - financial_reports
    automated_decision_making: false
    third_party_sharing: true
    third_parties:
      - payment_processors
      - tax_authorities
      - financial_institutions

# Data subject rights per purpose
data_subject_rights:
  # Rights that apply to all purposes
  universal_rights:
    - right_to_information
    - right_of_access
    - right_to_rectification
    - right_to_data_portability
    
  # Purpose-specific rights
  purpose_specific:
    marketing:
      additional_rights:
        - right_to_object
        - right_to_withdraw_consent
    
    analytics:
      additional_rights:
        - right_to_object
        
    automated_decisions:
      additional_rights:
        - right_not_to_be_subject_to_automated_decision_making
        - right_to_human_intervention

# Cross-border data transfers
international_transfers:
  enabled: true
  adequacy_decisions:
    - "European Union"
    - "United Kingdom"
    - "Canada"
  
  safeguards:
    standard_contractual_clauses: true
    binding_corporate_rules: false
    certification_schemes: true
    
  third_countries:
    united_states:
      transfer_mechanism: "standard_contractual_clauses"
      additional_safeguards: "encryption_in_transit_and_rest"
    
    singapore:
      transfer_mechanism: "adequacy_decision"

# Regular review schedule
review_schedule:
  quarterly:
    - consent_rates
    - data_minimization_compliance
    - retention_policy_adherence
    
  annually:
    - purpose_limitation_assessment
    - legitimate_interest_balancing_test
    - data_protection_impact_assessment
    
  as_needed:
    - regulatory_changes
    - business_model_changes
    - new_technology_implementation
